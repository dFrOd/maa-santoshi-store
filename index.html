      e('div',{className:'field'}, e('label',null,'Password'),
        e('input',{type:'password', value:pin, onChange:ev=>{setPin(ev.target.value);setErr("");},
          onKeyDown:ev=>ev.key==='Enter'&&submit(), placeholder:'••••••', autoFocus:!FB.enabled})),
      err && e('div',{className:'err'}, err),
      e('button',{className:'btn-primary', style:{width:'100%'}, disabled:busy, onClick:submit}, busy?'Signing in…':'Enter dashboard')
    )
  );
}

function OrderCard({o, onSetDelivery, onDeliverySent, onSetStatus, onDelete}) {
  const [open,setOpen]=useState(false);
  const [num,setNum]=useState(o.delivery?.num || "");
  const [unit,setUnit]=useState(o.delivery?.unit || "days");
  const [note,setNote]=useState(o.delivery?.note || "");
  const [err,setErr]=useState("");
  const [confirmDel,setConfirmDel]=useState(false);
  const send = async () => {
    const n = parseInt(num, 10);
    if(isNaN(n) || n<=0){ setErr("Enter a number greater than 0."); return; }
    setErr("");
    await onSetDelivery(o.id, {num:n, unit, note:note.trim()});
    setOpen(false); onDeliverySent();
  };
  const etaText = o.delivery
    ? o.delivery.num + " " + (o.delivery.num===1 ? o.delivery.unit.replace(/s$/,'') : o.delivery.unit)
    : null;
  const st = orderStatus(o);
  const showBreak = (o.code && o.codePercent>0) || o.deliveryFee>0 || o.gstAmount>0;
  return e('div',{className:'order-card'+(o.read?'':' unread')},
    e('div',{className:'order-head'},
      e('span', null,
        e('span',{className:'who'}, o.name || o.email),
        o.name && e('span',{style:{fontSize:13, color:'var(--muted)', marginLeft:8}}, o.email),
        o.phone && e('a',{href:'tel:+91'+o.phone, style:{fontSize:13, color:'var(--brass-deep)', fontWeight:600, marginLeft:8, textDecoration:'none'}}, '📞 '+fmtPhone(o.phone))
      ),
      e('span',{className:'when'}, o.when)
    ),
    e('div',{style:{display:'flex', alignItems:'center', gap:10, margin:'2px 0 12px', flexWrap:'wrap'}},
      e('span',{className:'status-chip st-'+st}, STATUS_META[st].emoji+' '+statusLabel(st)),
      e('select',{className:'status-select', value:st, onChange:ev=>onSetStatus(o.id, ev.target.value)},
        ORDER_FLOW.map(k=>e('option',{key:k, value:k}, statusLabel(k)))
          .concat(e('option',{key:'cancelled', value:'cancelled'}, 'Cancelled'))
      ),
      st!=='cancelled' && nextStatus(st) && e('button',{className:'link-btn', onClick:()=>onSetStatus(o.id, nextStatus(st))},
        'Mark '+statusLabel(nextStatus(st))+' →')
    ),
    o.address && e('div',{style:{fontSize:13, color:'var(--text)', background:'var(--surface)', border:'1px solid var(--line)', borderRadius:10, padding:'9px 12px', marginBottom:10, lineHeight:1.45, whiteSpace:'pre-wrap'}},
      e('span',{style:{textTransform:'uppercase', letterSpacing:'.1em', fontSize:11, color:'var(--brass-deep)', fontWeight:600, display:'block', marginBottom:3}}, 'Deliver to'),
      o.address),
    o.lines.map((l,i)=>e('div',{key:i, className:'order-line'},
      e('span', null, l.qty+' × '+l.name),
      e('span', null, rupees(l.price*l.qty))
    )),
    showBreak && e('div',{className:'order-line', style:{color:'var(--muted)'}},
      e('span', null, 'Subtotal'), e('span', null, rupees(o.subtotal!=null?o.subtotal:o.total))),
    o.code && o.codePercent>0 && e('div',{className:'order-line', style:{color:'var(--brass-deep)', fontWeight:600}},
      e('span', null, '🏷️ '+o.code+' (−'+o.codePercent+'%)'),
      e('span', null, '−'+rupees(o.codeDiscount||0))),
    o.deliveryFee>0 && e('div',{className:'order-line', style:{color:'var(--muted)'}},
      e('span', null, 'Delivery'), e('span', null, rupees(o.deliveryFee))),
    o.gstAmount>0 && e('div',{className:'order-line', style:{color:'var(--muted)'}},
      e('span', null, 'GST ('+o.gstPercent+'%)'), e('span', null, rupees(o.gstAmount))),
    e('div',{className:'order-line', style:{fontWeight:600, borderTop:'1px solid var(--line)', marginTop:6, paddingTop:8}},
      e('span', null, 'Total'), e('span', null, rupees(o.total))),
    // delivery estimate area
    e('div',{style:{marginTop:12, paddingTop:12, borderTop:'1px dashed var(--line)'}},
      etaText && !open && e('div',{style:{display:'flex', alignItems:'center', gap:8, marginBottom:open?0:10, flexWrap:'wrap'}},
        e('span',{className:'eta-chip'}, '🚚 Delivery in '+etaText),
        o.delivery.note && e('span',{style:{fontSize:13, color:'var(--muted)'}}, '— '+o.delivery.note)
      ),
      !open
        ? e('button',{className:'link-btn', onClick:()=>setOpen(true)}, etaText ? 'Update delivery time' : '+ Set delivery time')
        : e('div',null,
            e('div',{style:{fontSize:13, fontWeight:600, marginBottom:8}}, 'Tell the customer when it arrives'),
            e('div',{style:{display:'flex', gap:8, marginBottom:8, flexWrap:'wrap'}},
              e('input',{type:'number', min:1, value:num, onChange:ev=>setNum(ev.target.value),
                placeholder:'e.g. 2', style:{width:90, border:'1px solid var(--line)', borderRadius:10, padding:'10px 12px', background:'var(--surface)', font:'inherit', fontSize:14}}),
              e('select',{value:unit, onChange:ev=>setUnit(ev.target.value),
                style:{border:'1px solid var(--line)', borderRadius:10, padding:'10px 12px', background:'var(--surface)', font:'inherit', fontSize:14}},
                ['hours','days','weeks'].map(u=>e('option',{key:u, value:u}, u)))
            ),
            e('input',{value:note, onChange:ev=>setNote(ev.target.value),
              placeholder:'Optional note (e.g. delivered between 4–6 PM)',
              style:{width:'100%', border:'1px solid var(--line)', borderRadius:10, padding:'10px 12px', background:'var(--surface)', font:'inherit', fontSize:14, marginBottom:8}}),
            err && e('div',{className:'err'}, err),
            e('div',{style:{display:'flex', gap:8}},
              e('button',{className:'btn-ghost', style:{flex:1, padding:'9px 14px'}, onClick:()=>{setOpen(false);setErr("");}}, 'Cancel'),
              e('button',{className:'btn-primary', style:{flex:1, padding:'9px 14px'}, onClick:send}, 'Send to customer')
            )
          )
    ),
    onDelete && e('div',{style:{marginTop:10, textAlign:'right'}},
      confirmDel
        ? e('span',{style:{display:'inline-flex', gap:8, alignItems:'center'}},
            e('span',{style:{fontSize:13, color:'var(--muted)'}}, 'Delete this order?'),
            e('button',{className:'remove', onClick:()=>{ onDelete(o.id); setConfirmDel(false); }}, 'Yes'),
            e('button',{className:'link-btn', onClick:()=>setConfirmDel(false)}, 'No'))
        : e('button',{className:'remove', style:{fontSize:12}, onClick:()=>setConfirmDel(true)}, 'Delete order')
    )
  );
}

function StoreSettings({settings, items, onUpdateSettings, onSaved}) {
  const [promoText,setPromoText]=useState(settings.promo?.text || "");
  const [promoOn,setPromoOn]=useState(settings.promo?.on ?? true);
  const [promoPct,setPromoPct]=useState(settings.promo?.percent || "");
  const [promoErr,setPromoErr]=useState("");
  const [newCat,setNewCat]=useState("");
  const [catErr,setCatErr]=useState("");
  const [newCode,setNewCode]=useState("");
  const [newCodePct,setNewCodePct]=useState("");
  const [codeErr,setCodeErr]=useState("");
  const shop0 = settings.shop || {};
  const [shopPhone,setShopPhone]=useState(shop0.phone||"");
  const [shopWa,setShopWa]=useState(shop0.whatsapp||"");
  const [shopHours,setShopHours]=useState(shop0.hours||"");
  const [shopAddr,setShopAddr]=useState(shop0.address||"");
  const [shopMaps,setShopMaps]=useState(shop0.maps||"");
  const [shopErr,setShopErr]=useState("");
  const ch0 = settings.charges || {};
  const [deliveryFee,setDeliveryFee]=useState(ch0.deliveryFee||"");
  const [freeAbove,setFreeAbove]=useState(ch0.freeAbove||"");
  const [minOrder,setMinOrder]=useState(ch0.minOrder||"");
  const [gstPercent,setGstPercent]=useState(ch0.gstPercent||"");
  const [chargeErr,setChargeErr]=useState("");
  const [rawLogo,setRawLogo]=useState(null);
  const logoRef=useRef();
  const cats = settings.categories || DEFAULT_CATEGORIES;
  const codes = settings.codes || [];

  const pickLogo=(ev)=>{
    const f=ev.target.files[0]; if(!f) return;
    if(f.size>4*1024*1024){ onSaved("Logo image too large — use one under 4MB."); return; }
    const r=new FileReader(); r.onload=()=>setRawLogo(r.result); r.readAsDataURL(f);
    ev.target.value="";
  };
  const addCat=()=>{
    const c=newCat.trim();
    if(!c){ setCatErr("Enter a category name."); return; }
    if(cats.some(x=>x.toLowerCase()===c.toLowerCase())){ setCatErr("That category already exists."); return; }
    onUpdateSettings({categories:[...cats, c]}); setNewCat(""); setCatErr(""); onSaved("Section added");
  };
  const removeCat=(c)=>{
    const inUse=items.filter(i=>i.cat===c).length;
    if(inUse>0){ onSaved("Can’t remove “"+c+"” — "+inUse+" item(s) use it."); return; }
    onUpdateSettings({categories:cats.filter(x=>x!==c)}); onSaved("Section removed");
  };
  const savePromo=()=>{
    setPromoErr("");
    let pct = promoPct===""||promoPct===null ? 0 : parseFloat(promoPct);
    if(isNaN(pct)||pct<0||pct>=100){ setPromoErr("Discount must be between 0 and 99%."); return; }
    onUpdateSettings({promo:{text:promoText.trim(), on:promoOn, percent:pct}});
    onSaved(promoOn && pct>0 ? ("Sale live — "+pct+"% off all items") : "Offer banner saved");
  };
  const addCode=()=>{
    setCodeErr("");
    const c=newCode.trim().toUpperCase();
    if(!c){ setCodeErr("Enter a code."); return; }
    if(/\s/.test(c)){ setCodeErr("Codes can’t contain spaces."); return; }
    if(codes.some(x=>(x.code||"").toUpperCase()===c)){ setCodeErr("That code already exists."); return; }
    const pct=parseFloat(newCodePct);
    if(isNaN(pct)||pct<=0||pct>=100){ setCodeErr("Discount must be between 1 and 99%."); return; }
    onUpdateSettings({codes:[...codes, {code:c, percent:pct, active:true}]});
    setNewCode(""); setNewCodePct(""); onSaved("Code “"+c+"” added");
  };
  const toggleCode=(code)=>{
    onUpdateSettings({codes:codes.map(x=>x.code===code?{...x, active:!x.active}:x)});
  };
  const removeCodeItem=(code)=>{
    onUpdateSettings({codes:codes.filter(x=>x.code!==code)});
    onSaved("Code “"+code+"” removed");
  };
  const saveShop=()=>{
    setShopErr("");
    const ph=shopPhone.trim(), wa=shopWa.trim();
    if(ph && !normalizePhone(ph)){ setShopErr("Phone must be a valid 10-digit mobile number."); return; }
    if(wa && !normalizePhone(wa)){ setShopErr("WhatsApp must be a valid 10-digit mobile number."); return; }
    onUpdateSettings({shop:{ phone: ph?normalizePhone(ph):"", whatsapp: wa?normalizePhone(wa):"",
      hours: shopHours.trim(), address: shopAddr.trim(), maps: shopMaps.trim() }});
    onSaved("Shop details saved");
  };
  const saveCharges=()=>{
    setChargeErr("");
    const df=parseFloat(deliveryFee)||0, fa=parseFloat(freeAbove)||0, mo=parseFloat(minOrder)||0, gp=parseFloat(gstPercent)||0;
    if(df<0||fa<0||mo<0){ setChargeErr("Amounts can’t be negative."); return; }
    if(gp<0||gp>=100){ setChargeErr("GST must be between 0 and 99%."); return; }
    onUpdateSettings({charges:{deliveryFee:df, freeAbove:fa, minOrder:mo, gstPercent:gp}});
    onSaved("Delivery & charges saved");
  };

  return e('div', null,
    // logo
    e('div',{style:{fontWeight:700, marginBottom:6}}, 'Store logo'),
    e('p',{style:{fontSize:13, color:'var(--muted)', marginBottom:12, lineHeight:1.5}},
      'Upload an image for the header icon — you can zoom and reposition it to fit the square.'),
    e('div',{style:{display:'flex', alignItems:'center', gap:14, marginBottom:8, flexWrap:'wrap'}},
      e('div',{className:'logo-preview'}, settings.logo ? e('img',{src:settings.logo}) : e(LogoMark)),
      e('label',{className:'file-label'}, settings.logo?'Change logo':'Upload logo',
        e('input',{ref:logoRef, type:'file', accept:'image/*', style:{display:'none'}, onChange:pickLogo})),
      settings.logo && e('button',{className:'link-btn', onClick:()=>setRawLogo(settings.logo)}, 'Adjust'),
      settings.logo && e('button',{className:'remove', onClick:()=>{ onUpdateSettings({logo:null}); onSaved("Logo reset"); }}, 'Reset')
    ),
    e('div',{style:{borderTop:'1px solid var(--line)', margin:'22px 0'}}),
    // sections
    e('div',{style:{fontWeight:700, marginBottom:6}}, 'Sections (categories)'),
    e('p',{style:{fontSize:13, color:'var(--muted)', marginBottom:12, lineHeight:1.5}},
      'These appear as filters in the header. A section in use by an item can’t be removed.'),
    e('div',{style:{display:'flex', flexWrap:'wrap', gap:8, marginBottom:12}},
      cats.map(c=>e('span',{key:c, className:'cat-tag'},
        c, e('button',{className:'cat-tag-x', title:'Remove', onClick:()=>removeCat(c)}, '×')))
    ),
    e('div',{style:{display:'flex', gap:8}},
      e('input',{value:newCat, onChange:ev=>setNewCat(ev.target.value),
        onKeyDown:ev=>ev.key==='Enter'&&addCat(), placeholder:'New section name',
        style:{flex:1, border:'1px solid var(--line)', borderRadius:10, padding:'10px 12px', background:'var(--surface-2)', font:'inherit', fontSize:14}}),
      e('button',{className:'btn-primary', style:{padding:'10px 16px'}, onClick:addCat}, 'Add')
    ),
    catErr && e('div',{className:'err', style:{marginTop:8}}, catErr),
    e('div',{style:{borderTop:'1px solid var(--line)', margin:'22px 0'}}),
    // promo banner
    e('div',{style:{fontWeight:700, marginBottom:6}}, 'Home page sale & offer banner'),
    e('p',{style:{fontSize:13, color:'var(--muted)', marginBottom:12, lineHeight:1.5}},
      'Set a store-wide discount that applies to every item, and a banner message for the start page. When the sale is on, all prices show the reduced amount with the original struck through.'),
    e('div',{style:{display:'flex', gap:10, alignItems:'flex-end'}},
      e('div',{className:'field', style:{width:150, marginBottom:12}},
        e('label',null,'Discount on all items (%)'),
        e('input',{type:'number', min:0, max:99, value:promoPct, onChange:ev=>setPromoPct(ev.target.value), placeholder:'e.g. 15'})),
      promoPct>0 && promoPct<100 && e('div',{style:{fontSize:13, color:'var(--brass-deep)', marginBottom:20, fontWeight:600}},
        'Applies to all '+items.length+' item'+(items.length===1?'':'s'))
    ),
    e('div',{className:'field'},
      e('label',null,'Banner message'),
      e('input',{value:promoText, onChange:ev=>setPromoText(ev.target.value),
        placeholder:'e.g. Diwali Sale — flat 15% off everything this week!'})),
    e('label',{style:{display:'flex', alignItems:'center', gap:8, fontSize:14, marginBottom:8, cursor:'pointer'}},
      e('input',{type:'checkbox', checked:promoOn, onChange:ev=>setPromoOn(ev.target.checked)}),
      'Activate sale & show banner on the home page'),
    e('p',{style:{fontSize:12.5, color:'var(--muted)', marginBottom:14, lineHeight:1.5}},
      'Turning this off restores original prices instantly. An item’s own discount still applies if it’s larger than the sale.'),
    promoErr && e('div',{className:'err'}, promoErr),
    e('button',{className:'btn-primary', onClick:savePromo}, 'Save sale & banner'),
    e('div',{style:{borderTop:'1px solid var(--line)', margin:'22px 0'}}),
    // discount codes
    e('div',{style:{fontWeight:700, marginBottom:6}}, 'Discount codes'),
    e('p',{style:{fontSize:13, color:'var(--muted)', marginBottom:12, lineHeight:1.5}},
      'Create codes customers can type into their cart. An active code takes its percentage off the cart total before the order is sent. Disable a code to switch it off without deleting it.'),
    codes.length>0 && e('div',{style:{display:'flex', flexDirection:'column', gap:8, marginBottom:12}},
      codes.map(c=>e('div',{key:c.code, className:'admin-item', style:{padding:'10px 12px', marginBottom:0}},
        e('div',{className:'ai-info'},
          e('div',{className:'ai-name'}, c.code,
            e('span',{style:{marginLeft:8, fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'.06em', padding:'3px 9px', borderRadius:999,
              ...(c.active ? {background:'var(--saffron)', color:'#fff'} : {background:'var(--surface)', color:'var(--muted)', border:'1px solid var(--line)'})}},
              c.active?'Active':'Inactive')),
          e('div',{className:'ai-meta'}, c.percent+'% off the cart total')
        ),
        e('button',{className:'link-btn', onClick:()=>toggleCode(c.code)}, c.active?'Disable':'Enable'),
        e('button',{className:'remove', style:{marginLeft:12}, onClick:()=>removeCodeItem(c.code)}, 'Delete')
      ))
    ),
    e('div',{style:{display:'flex', gap:8, alignItems:'flex-start'}},
      e('input',{value:newCode, onChange:ev=>{ setNewCode(ev.target.value.toUpperCase()); setCodeErr(""); },
        onKeyDown:ev=>ev.key==='Enter'&&addCode(), placeholder:'CODE e.g. SAVE10',
        style:{flex:1, border:'1px solid var(--line)', borderRadius:10, padding:'10px 12px', background:'var(--surface-2)', font:'inherit', fontSize:14, textTransform:'uppercase', letterSpacing:'.05em'}}),
      e('input',{type:'number', min:1, max:99, value:newCodePct, onChange:ev=>{ setNewCodePct(ev.target.value); setCodeErr(""); },
        onKeyDown:ev=>ev.key==='Enter'&&addCode(), placeholder:'% off',
        style:{width:96, border:'1px solid var(--line)', borderRadius:10, padding:'10px 12px', background:'var(--surface-2)', font:'inherit', fontSize:14}}),
      e('button',{className:'btn-primary', style:{padding:'10px 16px'}, onClick:addCode}, 'Add')
    ),
    codeErr && e('div',{className:'err', style:{marginTop:8}}, codeErr),
    e('div',{style:{borderTop:'1px solid var(--line)', margin:'22px 0'}}),
    // shop profile & contact
    e('div',{style:{fontWeight:700, marginBottom:6}}, 'Shop profile & contact'),
    e('p',{style:{fontSize:13, color:'var(--muted)', marginBottom:12, lineHeight:1.5}},
      'Shown to customers in the page footer. The WhatsApp number also powers the “Send order on WhatsApp” button in the cart.'),
    e('div',{style:{display:'flex', gap:10, flexWrap:'wrap'}},
      e('div',{className:'field', style:{flex:'1 1 200px'}}, e('label',null,'Phone'),
        e('input',{type:'tel', value:shopPhone, onChange:ev=>{setShopPhone(ev.target.value);setShopErr("");}, placeholder:'10-digit number'})),
      e('div',{className:'field', style:{flex:'1 1 200px'}}, e('label',null,'WhatsApp number'),
        e('input',{type:'tel', value:shopWa, onChange:ev=>{setShopWa(ev.target.value);setShopErr("");}, placeholder:'10-digit number'}))
    ),
    e('div',{className:'field'}, e('label',null,'Opening hours'),
      e('input',{value:shopHours, onChange:ev=>setShopHours(ev.target.value), placeholder:'e.g. Mon–Sat, 10 AM – 8 PM'})),
    e('div',{className:'field'}, e('label',null,'Shop address'),
      e('textarea',{value:shopAddr, onChange:ev=>setShopAddr(ev.target.value), placeholder:'Street, area, city, PIN'})),
    e('div',{className:'field'}, e('label',null,'Google Maps link (optional)'),
      e('input',{value:shopMaps, onChange:ev=>setShopMaps(ev.target.value), placeholder:'https://maps.google.com/…'})),
    shopErr && e('div',{className:'err'}, shopErr),
    e('button',{className:'btn-primary', onClick:saveShop}, 'Save shop details'),
    e('div',{style:{borderTop:'1px solid var(--line)', margin:'22px 0'}}),
    // delivery, GST & minimum order
    e('div',{style:{fontWeight:700, marginBottom:6}}, 'Delivery, GST & minimum order'),
    e('p',{style:{fontSize:13, color:'var(--muted)', marginBottom:12, lineHeight:1.5}},
      'Applied at checkout. Leave a field at 0 to switch it off. “Free above” waives delivery once the cart (after discounts) crosses that amount.'),
    e('div',{style:{display:'flex', gap:10, flexWrap:'wrap'}},
      e('div',{className:'field', style:{flex:'1 1 140px'}}, e('label',null,'Delivery fee (₹)'),
        e('input',{type:'number', min:0, value:deliveryFee, onChange:ev=>{setDeliveryFee(ev.target.value);setChargeErr("");}, placeholder:'0'})),
      e('div',{className:'field', style:{flex:'1 1 140px'}}, e('label',null,'Free delivery above (₹)'),
        e('input',{type:'number', min:0, value:freeAbove, onChange:ev=>{setFreeAbove(ev.target.value);setChargeErr("");}, placeholder:'0'}))
    ),
    e('div',{style:{display:'flex', gap:10, flexWrap:'wrap'}},
      e('div',{className:'field', style:{flex:'1 1 140px'}}, e('label',null,'Minimum order (₹)'),
        e('input',{type:'number', min:0, value:minOrder, onChange:ev=>{setMinOrder(ev.target.value);setChargeErr("");}, placeholder:'0'})),
      e('div',{className:'field', style:{flex:'1 1 140px'}}, e('label',null,'GST (%)'),
        e('input',{type:'number', min:0, max:99, value:gstPercent, onChange:ev=>{setGstPercent(ev.target.value);setChargeErr("");}, placeholder:'0'}))
    ),
    chargeErr && e('div',{className:'err'}, chargeErr),
    e('button',{className:'btn-primary', onClick:saveCharges}, 'Save delivery & charges'),
    rawLogo && e(ImageEditor, {src:rawLogo, aspect:1, round:false,
      onCancel:()=>setRawLogo(null),
      onApply:(data)=>{ onUpdateSettings({logo:data}); setRawLogo(null); onSaved("Logo updated"); }})
  );
}

function Overview({items, orders, onExportCSV}) {
  const active = orders.filter(o=>orderStatus(o)!=='cancelled');
  const revenue = active.reduce((s,o)=>s+(o.total||0),0);
  const pending = orders.filter(o=>['new','accepted','packed','out'].indexOf(orderStatus(o))>=0).length;
  const delivered = orders.filter(o=>orderStatus(o)==='delivered').length;
  const top = (()=>{ const m={}; active.forEach(o=>(o.lines||[]).forEach(l=>{ m[l.name]=(m[l.name]||0)+l.qty; }));
    return Object.keys(m).map(k=>[k,m[k]]).sort((a,b)=>b[1]-a[1]).slice(0,5); })();
  const low = items.filter(i=>itemStock(i)!=null && itemStock(i)<=5);
  return e('div', null,
    e('div',{className:'stat-grid'},
      e('div',{className:'stat-card'}, e('div',{className:'sv'}, rupees(revenue)), e('div',{className:'sl'}, 'Revenue')),
      e('div',{className:'stat-card'}, e('div',{className:'sv'}, orders.length), e('div',{className:'sl'}, 'Total orders')),
      e('div',{className:'stat-card'}, e('div',{className:'sv'}, pending), e('div',{className:'sl'}, 'In progress')),
      e('div',{className:'stat-card'}, e('div',{className:'sv'}, delivered), e('div',{className:'sl'}, 'Delivered'))
    ),
    e('div',{style:{display:'flex', gap:24, flexWrap:'wrap'}},
      e('div',{style:{flex:'1 1 240px'}},
        e('div',{style:{fontWeight:700, marginBottom:10}}, 'Top products'),
        top.length===0
          ? e('div',{style:{fontSize:13, color:'var(--muted)'}}, 'No sales yet.')
          : top.map((t,i)=>e('div',{key:i, className:'order-line'},
              e('span', null, (i+1)+'. '+t[0]), e('span',{style:{fontWeight:600}}, t[1]+' sold')))
      ),
      e('div',{style:{flex:'1 1 240px'}},
        e('div',{style:{fontWeight:700, marginBottom:10}}, 'Low stock'),
        low.length===0
          ? e('div',{style:{fontSize:13, color:'var(--muted)'}}, 'Everything’s well stocked.')
          : low.map(it=>e('div',{key:it.id, className:'order-line'},
              e('span', null, it.name),
              e('span',{style:{fontWeight:600, color:'var(--danger)'}}, itemStock(it)<=0?'Out of stock':(itemStock(it)+' left'))))
      )
    ),
    e('div',{style:{borderTop:'1px solid var(--line)', margin:'22px 0 16px'}}),
    e('button',{className:'btn-ghost', onClick:onExportCSV}, '⬇ Export orders (CSV)')
  );
}

function AdminDash({items, orders, unreadCount, settings, customers, onClose, onAdd, onEdit, onDelete, onToggleAvailable, onMarkRead, onChangePin, onPinChanged, onSetDelivery, onDeliverySent, onSetStatus, onDeleteOrder, onUpdateSettings, onSettingsSaved, onDeleteCustomer, onExport, onImport, onExportCSV, onResetPw, onLogout}) {
  const importRef = useRef();
  const [tab,setTab]=useState(unreadCount>0?'orders':'overview');
  const [cur,setCur]=useState(""), [np,setNp]=useState(""), [np2,setNp2]=useState("");
  const [pErr,setPErr]=useState(""), [pOk,setPOk]=useState(false);
  const [confirmDel,setConfirmDel]=useState(null); // email pending delete confirmation
  const [confirmDelItem,setConfirmDelItem]=useState(null); // item id pending delete confirmation
  useEffect(()=>{ if(tab==='orders'&&unreadCount>0) onMarkRead(); },[tab]);
  const submitPin = async () => {
    setPErr(""); setPOk(false);
    if(np!==np2){ setPErr("New passwords don’t match."); return; }
    const err = await onChangePin(cur, np);
    if(err){ setPErr(err); return; }
    setCur(""); setNp(""); setNp2(""); setPOk(true); onPinChanged();
  };
  return e('div',{className:'overlay', onClick:onClose},
    e('div',{className:'modal wide', onClick:ev=>ev.stopPropagation()},
      e('button',{className:'close-x', onClick:onClose}, '×'),
      e('h3', null, 'Shop dashboard'),
      e('p',{className:'sub'}, 'Add products, read orders, see customers, brand your store, and manage your account.'),
      e('div',{className:'admin-tabs'},
        e('button',{className:tab==='overview'?'active':'', onClick:()=>setTab('overview')}, 'Overview'),
        e('button',{className:tab==='items'?'active':'', onClick:()=>setTab('items')}, 'Products ('+items.length+')'),
        e('button',{className:tab==='orders'?'active':'', onClick:()=>setTab('orders')},
          'Inbox ('+orders.length+')', unreadCount>0 && e('span',{className:'new-badge'}, unreadCount+' new')),
        e('button',{className:tab==='customers'?'active':'', onClick:()=>setTab('customers')}, 'Customers ('+customers.length+')'),
        e('button',{className:tab==='store'?'active':'', onClick:()=>setTab('store')}, 'Store'),
        e('button',{className:tab==='account'?'active':'', onClick:()=>setTab('account')}, 'Account')
      ),
      tab==='overview'
        ? e(Overview, {items, orders, onExportCSV})
        : tab==='items'
        ? e('div', null,
            e('button',{className:'btn-primary', style:{marginBottom:16}, onClick:onAdd}, '+ Add new item'),
            items.map(it=>{
              const stk = itemStock(it);
              const hidden = it.available===false;
              return e('div',{key:it.id, className:'admin-item', style:hidden?{opacity:.6}:null},
                e('div',{className:'ai-thumb'}, it.img?e('img',{src:it.img}):catEmoji(it.cat)),
                e('div',{className:'ai-info'},
                  e('div',{className:'ai-name'}, it.name,
                    hasDiscount(it) && e('span',{className:'disc-badge-sm'}, '-'+Number(it.discount)+'%'),
                    hidden && e('span',{style:{marginLeft:8, fontSize:11, fontWeight:700, color:'var(--muted)'}}, '• Hidden')),
                  e('div',{className:'ai-meta'}, it.cat+' · ',
                    hasDiscount(it)
                      ? e('span', null, rupees(finalPrice(it)), ' ', e('span',{className:'price-old'}, rupees(it.price)))
                      : rupees(it.price),
                    stk!=null && e('span',{style:{marginLeft:8, color: stk<=5?'var(--danger)':'var(--muted)'}},
                      '· '+(stk<=0?'Out of stock':(stk+' in stock'))))
                ),
                e('button',{className:'link-btn', onClick:()=>onEdit(it)}, 'Edit'),
                e('button',{className:'link-btn', style:{marginLeft:12}, onClick:()=>onToggleAvailable(it.id)}, hidden?'Show':'Hide'),
                confirmDelItem===it.id
                  ? e('span',{style:{display:'inline-flex', gap:8, alignItems:'center', marginLeft:12}},
                      e('span',{style:{fontSize:13, color:'var(--muted)'}}, 'Delete?'),
                      e('button',{className:'remove', onClick:()=>{ onDelete(it.id); setConfirmDelItem(null); }}, 'Yes'),
                      e('button',{className:'link-btn', onClick:()=>setConfirmDelItem(null)}, 'No'))
                  : e('button',{className:'remove', style:{marginLeft:12}, onClick:()=>setConfirmDelItem(it.id)}, 'Delete')
              );
            })
          )
        : tab==='orders'
        ? e('div', null,
            orders.length===0
              ? e('div',{style:{padding:'30px 0', color:'var(--muted)', textAlign:'center'}}, 'No orders yet. They’ll show up here the moment a customer confirms.')
              : orders.map(o=>e(OrderCard, {key:o.id, o, onSetDelivery, onDeliverySent, onSetStatus, onDelete:onDeleteOrder}))
          )
        : tab==='customers'
        ? e('div', null,
            customers.length===0
              ? e('div',{style:{padding:'30px 0', color:'var(--muted)', textAlign:'center'}}, 'No customers yet. They appear here once someone places an order.')
              : customers.map(c=>e('div',{key:c.email, className:'admin-item'},
                  e('div',{className:'cust-avatar'}, (c.name||c.email||'?').trim().charAt(0).toUpperCase()),
                  e('div',{className:'ai-info'},
                    e('div',{className:'ai-name'}, c.name || c.email),
                    e('div',{className:'ai-meta'},
                      [c.name?c.email:null, c.phone?fmtPhone(c.phone):null,
                        c.orders>0 ? (c.orders+' order'+(c.orders===1?'':'s')+' · '+rupees(c.total)) : 'No orders yet'].filter(Boolean).join(' · '))
                  ),
                  confirmDel===c.email
                    ? e('span',{style:{display:'inline-flex', gap:8, alignItems:'center'}},
                        e('span',{style:{fontSize:13, color:'var(--muted)'}}, 'Delete?'),
                        e('button',{className:'remove', onClick:()=>{ onDeleteCustomer(c.email); setConfirmDel(null); }}, 'Yes'),
                        e('button',{className:'link-btn', onClick:()=>setConfirmDel(null)}, 'No')
                      )
                    : e('button',{className:'remove', onClick:()=>setConfirmDel(c.email)}, 'Delete')
                ))
          )
        : tab==='store'
        ? e(StoreSettings, {settings, items, onUpdateSettings, onSaved:onSettingsSaved})
        : e('div', null,
            FB.enabled
              ? e('div', null,
                  e('div',{style:{fontWeight:700, marginBottom:4}}, 'Admin login'),
                  e('p',{style:{fontSize:13, color:'var(--muted)', marginBottom:14, lineHeight:1.5}},
                    'You sign in with your admin email and password (managed securely by Firebase). To change it, email yourself a reset link.'),
                  e('button',{className:'btn-ghost', onClick:onResetPw}, '✉ Send password-reset email'))
              : e('div', null,
                  e('div',{style:{fontWeight:700, marginBottom:4}}, 'Change admin password'),
                  e('p',{style:{fontSize:13, color:'var(--muted)', marginBottom:18, lineHeight:1.5}},
                    'Set a new password for signing in to this dashboard. It applies to everyone who uses admin access.'),
                  e('div',{className:'field'}, e('label',null,'Current password'),
                    e('input',{type:'password', value:cur, onChange:ev=>setCur(ev.target.value), placeholder:'••••••'})),
                  e('div',{className:'field'}, e('label',null,'New password'),
                    e('input',{type:'password', value:np, onChange:ev=>setNp(ev.target.value), placeholder:'At least 4 characters'})),
                  e('div',{className:'field'}, e('label',null,'Confirm new password'),
                    e('input',{type:'password', value:np2, onChange:ev=>setNp2(ev.target.value),
                      onKeyDown:ev=>ev.key==='Enter'&&submitPin(), placeholder:'Re-enter new password'})),
                  pErr && e('div',{className:'err'}, pErr),
                  pOk && e('div',{style:{color:'var(--brass-deep)', fontSize:13, marginBottom:12, fontWeight:600}}, '✓ Password updated.'),
                  e('button',{className:'btn-primary', onClick:submitPin}, 'Update password')),
            e('div',{style:{borderTop:'1px solid var(--line)', margin:'24px 0'}}),
            e('div',{style:{fontWeight:700, marginBottom:4}}, 'Backup & restore'),
            e('p',{style:{fontSize:13, color:'var(--muted)', marginBottom:14, lineHeight:1.5}},
              'Download a backup file with all products, orders, settings, and your password. On Chrome and Edge you can choose where to save it (e.g. your Desktop); other browsers save it to Downloads. Restore it later, or on another device, to bring everything back exactly as it was.'),
            e('div',{style:{display:'flex', gap:10, flexWrap:'wrap'}},
              e('button',{className:'btn-primary', onClick:onExport}, '⬇ Download backup'),
              e('button',{className:'btn-ghost', onClick:()=>importRef.current && importRef.current.click()}, '⬆ Restore from file'),
              e('input',{ref:importRef, type:'file', accept:'application/json,.json', style:{display:'none'},
                onChange:ev=>{ const f=ev.target.files[0]; if(f) onImport(f); ev.target.value=""; }})
            ),
            e('p',{style:{fontSize:12.5, color:'var(--muted)', marginTop:12, lineHeight:1.5}},
              'Restoring replaces all current data with the file’s contents.')
          ),
      e('div',{style:{marginTop:20, textAlign:'right'}},
        e('button',{className:'btn-ghost', onClick:onLogout}, 'Sign out of admin'))
    )
  );
}

function ImageEditor({src, aspect, round, onCancel, onApply}) {
  // aspect = width/height of the crop frame; round = circular mask (for logo)
  const FRAME_W = 320;
  const FRAME_H = Math.round(FRAME_W / aspect);
  const OUT_W = aspect >= 1 ? 900 : Math.round(900*aspect);
  const OUT_H = Math.round(OUT_W / aspect);
  const [zoom,setZoom]=useState(1);
  const [pos,setPos]=useState({x:0,y:0});
  const [img,setImgEl]=useState(null);
  const [base,setBase]=useState(1); // scale that makes the image "cover" the frame at zoom 1
  const drag=useRef(null);

  useEffect(()=>{
    const im=new Image();
    im.onload=()=>{
      const b=Math.max(FRAME_W/im.width, FRAME_H/im.height);
      setBase(b); setImgEl(im); setZoom(1); setPos({x:0,y:0});
    };
    im.src=src;
  },[src]);

  const scale = base*zoom;
  const clamp=(p)=>{
    if(!img) return p;
    const w=img.width*scale, h=img.height*scale;
    const maxX=Math.max(0,(w-FRAME_W)/2), maxY=Math.max(0,(h-FRAME_H)/2);
    return { x:Math.max(-maxX,Math.min(maxX,p.x)), y:Math.max(-maxY,Math.min(maxY,p.y)) };
  };
  const onDown=(ev)=>{ const t=ev.touches?ev.touches[0]:ev; drag.current={sx:t.clientX, sy:t.clientY, ox:pos.x, oy:pos.y}; };
  const onMove=(ev)=>{
    if(!drag.current) return;
    const t=ev.touches?ev.touches[0]:ev;
    setPos(clamp({x:drag.current.ox+(t.clientX-drag.current.sx), y:drag.current.oy+(t.clientY-drag.current.sy)}));
  };
  const onUp=()=>{ drag.current=null; };

  const apply=()=>{
    if(!img) return;
    const canvas=document.createElement('canvas');
    canvas.width=OUT_W; canvas.height=OUT_H;
    const ctx=canvas.getContext('2d');
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,OUT_W,OUT_H);
    const ratio=OUT_W/FRAME_W; // map frame coords to output coords
    const w=img.width*scale*ratio, h=img.height*scale*ratio;
    const cx=OUT_W/2 + pos.x*ratio, cy=OUT_H/2 + pos.y*ratio;
    ctx.drawImage(img, cx-w/2, cy-h/2, w, h);
    onApply(canvas.toDataURL('image/jpeg', 0.85));
  };

  const imgStyle = img ? {
    position:'absolute', left:'50%', top:'50%',
    width:img.width*scale+'px', height:img.height*scale+'px',
    transform:'translate(-50%,-50%) translate('+pos.x+'px,'+pos.y+'px)',
    userSelect:'none', pointerEvents:'none', maxWidth:'none'
  } : {};

  return e('div',{className:'overlay', style:{zIndex:120}, onClick:onCancel},
    e('div',{className:'modal', style:{maxWidth:400}, onClick:ev=>ev.stopPropagation()},
      e('button',{className:'close-x', onClick:onCancel}, '×'),
      e('h3', null, 'Adjust photo'),
      e('p',{className:'sub'}, 'Drag to reposition and use the slider to zoom. The shaded area is what will show.'),
      e('div',{className:'editor-frame', style:{width:FRAME_W, height:FRAME_H, margin:'0 auto'},
        onMouseDown:onDown, onMouseMove:onMove, onMouseUp:onUp, onMouseLeave:onUp,
        onTouchStart:onDown, onTouchMove:onMove, onTouchEnd:onUp},
        img && e('img',{src:src, style:imgStyle, alt:''}),
        e('div',{className:'editor-mask'+(round?' round':'')})
      ),
      e('div',{style:{display:'flex', alignItems:'center', gap:10, margin:'16px 0 4px'}},
        e('span',{style:{fontSize:18}}, '🔍'),
        e('input',{type:'range', min:1, max:3, step:0.01, value:zoom,
          onChange:ev=>{ const z=parseFloat(ev.target.value); setZoom(z); setTimeout(()=>setPos(p=>clamp(p)),0); },
          style:{flex:1}})
      ),
      e('div',{className:'modal-actions'},
        e('button',{className:'btn-ghost', onClick:onCancel}, 'Cancel'),
        e('button',{className:'btn-primary', onClick:apply}, 'Use photo'))
    )
  );
}

function ItemForm({existing, categories, onClose, onSave}) {
  const cats = (categories && categories.length) ? categories : DEFAULT_CATEGORIES;
  const [name,setName]=useState(existing?.name||"");
  const [cat,setCat]=useState(existing?.cat||cats[0]);
  const [price,setPrice]=useState(existing?.price||"");
  const [discount,setDiscount]=useState(existing?.discount||"");
  const [desc,setDesc]=useState(existing?.desc||"");
  const [img,setImg]=useState(existing?.img||null);
  const [stock,setStock]=useState(existing && existing.stock!=null ? String(existing.stock) : "");
  const [available,setAvailable]=useState(existing ? existing.available!==false : true);
  const [rawImg,setRawImg]=useState(null); // image awaiting adjustment
  const [err,setErr]=useState("");
  const fileRef=useRef();

  const pick=(ev)=>{
    const f=ev.target.files[0]; if(!f) return;
    if(f.size>4*1024*1024){setErr("Image is too large — please use one under 4MB.");return;}
    setErr("");
    const r=new FileReader(); r.onload=()=>setRawImg(r.result); r.readAsDataURL(f);
    ev.target.value=""; // allow re-picking same file
  };
  const submit=()=>{
    if(!name.trim()){setErr("Give the item a name.");return;}
    const p=parseFloat(price);
    if(isNaN(p)||p<0){setErr("Enter a valid price.");return;}
    let d = discount===""||discount===null ? 0 : parseFloat(discount);
    if(isNaN(d)||d<0||d>=100){setErr("Discount must be between 0 and 99%.");return;}
    let st = (stock===""||stock===null) ? null : Math.floor(parseFloat(stock));
    if(st!=null && (isNaN(st)||st<0)){setErr("Stock must be 0 or more (leave blank for unlimited).");return;}
    onSave({id:existing?.id, name:name.trim(), cat, price:p, discount:d,
      desc:desc.trim()||"No description yet.", img, stock:st, available});
  };
  // live discounted-price preview
  const pNum = parseFloat(price), dNum = parseFloat(discount);
  const showPreview = !isNaN(pNum) && pNum>0 && !isNaN(dNum) && dNum>0 && dNum<100;
  const previewPrice = showPreview ? Math.round(pNum*(1-dNum/100)) : null;

  return e('div',{className:'overlay', onClick:onClose},
    e('div',{className:'modal', onClick:ev=>ev.stopPropagation()},
      e('button',{className:'close-x', onClick:onClose}, '×'),
      e('h3', null, existing?'Edit item':'Add new item'),
      e('p',{className:'sub'}, 'Fill in the details, set an optional discount, and upload a photo.'),
      e('div',{className:'field'}, e('label',null,'Name'),
        e('input',{value:name, onChange:ev=>setName(ev.target.value), placeholder:'e.g. Cast Iron Skillet'})),
      e('div',{className:'field'}, e('label',null,'Category'),
        e('select',{value:cat, onChange:ev=>setCat(ev.target.value)},
          cats.map(c=>e('option',{key:c, value:c}, c)))),
      e('div',{style:{display:'flex', gap:10}},
        e('div',{className:'field', style:{flex:1}}, e('label',null,'Price (₹ INR)'),
          e('input',{type:'number', value:price, onChange:ev=>setPrice(ev.target.value), placeholder:'e.g. 4999'})),
        e('div',{className:'field', style:{flex:1}}, e('label',null,'Discount (%)'),
          e('input',{type:'number', min:0, max:99, value:discount, onChange:ev=>setDiscount(ev.target.value), placeholder:'0'}))
      ),
      showPreview && e('div',{style:{marginTop:-6, marginBottom:14, fontSize:14}},
        'Sells for ', e('strong',{style:{color:'var(--text)'}}, rupees(previewPrice)),
        ' ', e('span',{className:'price-old'}, rupees(Math.round(pNum)))),
      e('div',{className:'field'}, e('label',null,'Stock quantity'),
        e('input',{type:'number', min:0, value:stock, onChange:ev=>setStock(ev.target.value), placeholder:'Leave blank for unlimited'}),
        e('div',{style:{fontSize:12, color:'var(--muted)', marginTop:6, lineHeight:1.4}},
          'Tracks inventory and shows “Out of stock” at 0. Blank = not tracked.')),
      e('label',{style:{display:'flex', alignItems:'center', gap:8, fontSize:14, marginBottom:16, cursor:'pointer'}},
        e('input',{type:'checkbox', checked:available, onChange:ev=>setAvailable(ev.target.checked)}),
        'Available for sale (uncheck to hide it from the store)'),
      e('div',{className:'field'}, e('label',null,'Description'),
        e('textarea',{value:desc, onChange:ev=>setDesc(ev.target.value), placeholder:'A short description for shoppers.'})),
      e('div',{className:'field'}, e('label',null,'Photo'),
        e('div', null,
          e('div',{style:{display:'flex', gap:8, alignItems:'center', flexWrap:'wrap'}},
            e('label',{className:'file-label'}, img?'Change photo':'Upload photo',
              e('input',{ref:fileRef, type:'file', accept:'image/*', style:{display:'none'}, onChange:pick})),
            img && e('button',{className:'link-btn', onClick:()=>setRawImg(img)}, 'Adjust photo'),
            img && e('button',{className:'remove', onClick:()=>setImg(null)}, 'Remove')
          ),
          img && e('img',{className:'img-preview', src:img}))),
      err && e('div',{className:'err'}, err),
      e('div',{className:'modal-actions'},
        e('button',{className:'btn-ghost', onClick:onClose}, 'Cancel'),
        e('button',{className:'btn-primary', onClick:submit}, existing?'Save changes':'Add item')),
      rawImg && e(ImageEditor, {src:rawImg, aspect:4/3, round:false,
        onCancel:()=>setRawImg(null),
        onApply:(data)=>{ setImg(data); setRawImg(null); }})
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
