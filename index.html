<style>
  :root {
    /* spice-market palette: deep warm grounds, brass + saffron accents */
    --brass: #d9a24b;
    --brass-deep: #b97e2e;
    --saffron: #e8732e;
    --ink: #1c1814;          /* near-black warm */
    --ink-2: #271f18;        /* raised dark surface */
    --bg: #efe6d6;           /* warm sand page bg */
    --bg-2: #e7dcc8;         /* slightly deeper sand for banding */
    --surface: #fbf6ec;      /* card / panel surface */
    --surface-2: #f3ead9;    /* inset / thumb bg */
    --text: #2a221a;
    --muted: #8a7d6a;
    --line: #e0d4be;
    --line-soft: #ece2d0;
    --danger: #b8442f;
  }

  /* Dark theme — a deep, warm near-black that keeps the brass + saffron accents */
  :root[data-theme="dark"] {
    --brass: #e6b765;
    --brass-deep: #d49a3f;
    --saffron: #ef8434;
    --ink: #100d0a;          /* darkest surface: hero, toast, add-btn */
    --ink-2: #1b1611;
    --bg: #15110d;           /* page background */
    --bg-2: #1c1712;         /* banding / scrollbar track */
    --surface: #221c15;      /* card / panel surface */
    --surface-2: #2c251c;    /* inset / thumb bg */
    --text: #f1e8d8;
    --muted: #a99c86;
    --line: #3a3122;
    --line-soft: #2c2519;
    --danger: #e8765c;
  }
  :root[data-theme="dark"] header { background: rgba(28,23,17,.80); }
  :root[data-theme="dark"] .card .thumb,
  :root[data-theme="dark"] .cart-line .ci-thumb,
  :root[data-theme="dark"] .admin-item .ai-thumb {
    background: radial-gradient(circle at 50% 35%, var(--surface-2), var(--ink-2));
  }
  :root[data-theme="dark"] .add-btn { box-shadow: inset 0 0 0 1px var(--line); }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  /* form controls don't inherit text color by default — keep them readable in both themes */
  input, select, textarea { color: var(--text); }
  option { color: var(--text); background: var(--surface); }

  #root {
    font-family: 'Hanken Grotesk', -apple-system, system-ui, sans-serif;
    color: var(--text);
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(217,162,75,.18), transparent 60%),
      radial-gradient(900px 500px at -10% 10%, rgba(232,115,46,.12), transparent 55%),
      radial-gradient(760px 760px at 50% 118%, rgba(217,162,75,.10), transparent 60%),
      var(--bg);
    background-repeat: no-repeat;   /* was background-attachment:fixed — that's buggy on iOS Safari */
    background-color: var(--bg);
    min-height: 100vh;
    min-height: 100dvh;             /* accounts for iOS Safari's dynamic toolbar */
    -webkit-text-size-adjust: 100%; /* stop iOS from auto-inflating text */
    -webkit-font-smoothing: antialiased;
  }

  /* Themed brass scrollbar */
  ::-webkit-scrollbar { width: 12px; height: 12px; }
  ::-webkit-scrollbar-track { background: var(--bg-2); }
  ::-webkit-scrollbar-thumb {
    background: linear-gradient(var(--brass), var(--brass-deep));
    border-radius: 999px; border: 3px solid var(--bg-2);
  }
  ::-webkit-scrollbar-thumb:hover { background: linear-gradient(var(--saffron), var(--brass-deep)); }

  .wrap { max-width: 1180px; margin: 0 auto; padding: 0 24px; }

  /* Header */
  header {
    background: rgba(251,246,236,.82);
    backdrop-filter: saturate(150%) blur(14px);
    -webkit-backdrop-filter: saturate(150%) blur(14px);
    border-bottom: 1px solid var(--line);
    box-shadow: 0 6px 24px rgba(40,28,12,.06);
    position: sticky; top: 0; z-index: 50;
  }
  .bar {
    display: flex; align-items: center; justify-content: space-between;
    min-height: 78px; gap: 16px 24px; flex-wrap: wrap; padding: 12px 0;
  }
  .logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
  .logo .crest {
    width: 50px; height: 50px; border-radius: 14px; flex-shrink: 0; overflow: hidden;
    background: linear-gradient(150deg, var(--brass), var(--saffron));
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; box-shadow: 0 6px 16px rgba(232,115,46,.34), inset 0 1px 0 rgba(255,255,255,.35);
    transition: transform .25s cubic-bezier(.2,.8,.2,1), box-shadow .25s;
  }
  .logo:hover .crest {
    transform: rotate(-4deg) scale(1.05);
    box-shadow: 0 10px 24px rgba(232,115,46,.42), inset 0 1px 0 rgba(255,255,255,.4);
  }
  .logo .crest.has-img { background: var(--surface); }
  .logo .crest img { width: 100%; height: 100%; object-fit: cover; }
  .logo .crest svg { width: 30px; height: 30px; display: block; }
  .logo .mark {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 22px; font-weight: 600; letter-spacing: -0.02em;
    color: var(--text); line-height: 1.05;
  }
  .logo .tag {
    display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em;
    color: var(--brass-deep); margin-top: 3px; font-weight: 600;
  }
  nav { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; flex: 1; justify-content: flex-end; }
  .cats { display: flex; gap: 2px; flex-wrap: wrap; flex: 1; min-width: 0; }
  .actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
  .cat-btn {
    background: none; border: none; font: inherit; font-size: 14px;
    color: var(--muted); padding: 8px 13px; border-radius: 999px; cursor: pointer;
    transition: background .18s, color .18s;
  }
  .cat-btn:hover { background: var(--surface-2); color: var(--text); }
  .cat-btn.active {
    color: var(--text); font-weight: 600;
    background: linear-gradient(150deg, rgba(217,162,75,.28), rgba(232,115,46,.22));
  }

  .icon-btn {
    background: var(--surface); border: 1px solid var(--line); border-radius: 11px;
    padding: 9px 14px; font: inherit; font-size: 14px; cursor: pointer;
    color: var(--text); display: inline-flex; align-items: center; gap: 7px;
    transition: border-color .18s, transform .12s, box-shadow .18s;
  }
  .icon-btn:hover { border-color: var(--brass); transform: translateY(-1px); box-shadow: 0 6px 14px rgba(40,28,12,.08); }
  .icon-btn.active { border-color: var(--brass); }
  .caret { font-size: 10px; opacity: .7; margin-left: 1px; }
  .acct-wrap { position: relative; }
  .acct-menu {
    position: absolute; right: 0; top: calc(100% + 8px); z-index: 60;
    background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
    box-shadow: 0 16px 38px rgba(24,18,12,.22); width: 248px; overflow: hidden;
    animation: rise .2s cubic-bezier(.2,.8,.2,1);
  }
  .acct-id { padding: 15px 16px; border-bottom: 1px solid var(--line-soft); }
  .acct-role { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--brass-deep); font-weight: 700; }
  .acct-detail { font-size: 15px; font-weight: 600; margin-top: 4px; word-break: break-word; }
  .acct-sub { font-size: 12.5px; color: var(--muted); margin-top: 2px; word-break: break-word; }
  .acct-signout {
    width: 100%; text-align: left; background: none; border: none; cursor: pointer;
    font: inherit; font-size: 14px; font-weight: 600; color: var(--danger);
    padding: 13px 16px; transition: background .15s;
  }
  .acct-signout:hover { background: rgba(184,68,47,.08); }
  .cart-count {
    background: var(--saffron); color: #fff; border-radius: 999px;
    min-width: 20px; height: 20px; font-size: 12px; font-weight: 700;
    display: inline-flex; align-items: center; justify-content: center; padding: 0 5px;
    box-shadow: 0 2px 6px rgba(232,115,46,.4);
    animation: badgePop .32s cubic-bezier(.2,.9,.3,1.5);
  }
  @keyframes badgePop { from { transform: scale(0); } to { transform: scale(1); } }
  .btn-primary {
    background: linear-gradient(150deg, var(--saffron), var(--brass-deep));
    color: #fff; border: none; border-radius: 11px;
    padding: 11px 19px; font: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: transform .12s, box-shadow .18s, filter .18s;
    box-shadow: 0 6px 16px rgba(232,115,46,.28);
    position: relative; overflow: hidden;
  }
  .btn-primary::after {
    content: ""; position: absolute; top: 0; left: -120%; width: 55%; height: 100%;
    background: linear-gradient(100deg, transparent, rgba(255,255,255,.38), transparent);
    transform: skewX(-18deg); transition: left .55s ease; pointer-events: none;
  }
  .btn-primary:hover::after { left: 150%; }
  .btn-primary:hover { transform: translateY(-1px); filter: brightness(1.05); box-shadow: 0 9px 22px rgba(232,115,46,.36); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }
  .btn-ghost {
    background: var(--surface); border: 1px solid var(--line); border-radius: 11px;
    padding: 11px 19px; font: inherit; font-size: 14px; cursor: pointer; color: var(--text);
    transition: border-color .18s;
  }
  .btn-ghost:hover { border-color: var(--brass); }

  /* Search row */
  .searchrow {
    display: flex; align-items: center; gap: 10px; padding: 0 0 14px;
    position: relative;
  }
  .search-ic { position: absolute; left: 14px; font-size: 14px; opacity: .6; pointer-events: none; }
  .search-input {
    flex: 1; border: 1px solid var(--line); border-radius: 12px;
    padding: 11px 14px 11px 40px; font: inherit; font-size: 14.5px;
    background: var(--surface); color: var(--text);
    transition: border-color .18s, box-shadow .18s;
  }
  .search-input:focus { outline: none; border-color: var(--saffron); box-shadow: 0 0 0 3px rgba(232,115,46,.13); }
  .search-clear {
    position: absolute; right: 12px; background: var(--surface-2); border: 1px solid var(--line);
    width: 26px; height: 26px; border-radius: 8px; cursor: pointer; font-size: 16px; line-height: 1;
    color: var(--muted);
  }
  .search-clear:hover { color: var(--danger); border-color: var(--danger); }

  /* Discount + strikethrough */
  .disc-badge {
    position: absolute; top: 11px; right: 11px; background: var(--danger); color: #fff;
    font-size: 12px; font-weight: 700; padding: 4px 9px; border-radius: 999px;
    box-shadow: 0 3px 10px rgba(184,68,47,.35);
  }
  .disc-badge-sm {
    background: var(--danger); color: #fff; font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 999px; margin-left: 8px; vertical-align: middle;
  }
  .price-wrap { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .price-old {
    font-size: 14px; color: var(--muted); text-decoration: line-through; font-weight: 500;
    font-family: 'Hanken Grotesk', sans-serif;
  }

  /* Promo banner on home */
  .promo-banner {
    display: inline-flex; align-items: center; gap: 12px; margin-top: 26px;
    background: linear-gradient(150deg, rgba(232,115,46,.22), rgba(217,162,75,.18));
    border: 1px solid rgba(232,115,46,.45); color: #fbf2e2;
    padding: 12px 18px; border-radius: 14px; font-size: 15.5px; font-weight: 500;
    max-width: 560px; line-height: 1.4;
  }
  .promo-tag {
    background: var(--saffron); color: #fff; font-size: 11px; text-transform: uppercase;
    letter-spacing: .1em; font-weight: 700; padding: 4px 10px; border-radius: 999px; flex-shrink: 0;
  }

  /* Store settings bits */
  .logo-preview {
    width: 56px; height: 56px; border-radius: 14px; overflow: hidden; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 26px;
    background: linear-gradient(150deg, var(--brass), var(--saffron));
  }
  .logo-preview img { width: 100%; height: 100%; object-fit: cover; }
  .logo-preview svg { width: 34px; height: 34px; }
  .cat-tag {
    display: inline-flex; align-items: center; gap: 6px; background: var(--surface-2);
    border: 1px solid var(--line); border-radius: 999px; padding: 6px 8px 6px 13px;
    font-size: 13.5px; font-weight: 500;
  }
  .cat-tag-x {
    background: none; border: none; cursor: pointer; color: var(--muted); font-size: 16px;
    line-height: 1; width: 20px; height: 20px; border-radius: 999px;
  }
  .cat-tag-x:hover { color: var(--danger); background: rgba(184,68,47,.1); }

  /* Hero */
  .hero {
    background:
      radial-gradient(800px 400px at 78% 30%, rgba(232,115,46,.30), transparent 60%),
      radial-gradient(700px 500px at 12% 90%, rgba(217,162,75,.22), transparent 55%),
      linear-gradient(155deg, #2a201700 0%, var(--ink) 55%, #120f0c 100%);
    background-color: var(--ink);
    color: #f3ead9; padding: 48px 0 52px; position: relative; overflow: hidden;
  }
  .hero::after {
    content: ""; position: absolute; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px);
    background-size: 22px 22px; opacity: .5; pointer-events: none;
  }
  .hero .wrap { position: relative; z-index: 2; }
  .hero .eyebrow {
    display: inline-block; font-size: 12px; text-transform: uppercase; letter-spacing: .22em;
    color: var(--brass); margin-bottom: 18px; font-weight: 600;
  }
  .hero h1 {
    font-family: 'Fraunces', Georgia, serif; font-weight: 600;
    font-size: clamp(28px, 4.4vw, 44px); line-height: 1.05; letter-spacing: -0.02em;
    max-width: 620px; color: #fcf6ea;
  }
  .hero h1 em {
    font-style: italic;
    background: linear-gradient(120deg, var(--brass) 0%, var(--saffron) 50%, #f4ba63 100%);
    background-size: 220% auto;
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    animation: sheen 6s ease-in-out infinite;
  }
  @keyframes sheen { 0%, 100% { background-position: 0% center; } 50% { background-position: 100% center; } }
  .hero p { margin-top: 22px; max-width: 470px; font-size: 17px; color: #cdbfa6; line-height: 1.55; }
  .hero .hero-stats { display: flex; gap: 24px; margin-top: 26px; flex-wrap: wrap; }
  .hero .hero-stats .stat .n {
    font-family: 'Fraunces', Georgia, serif; font-size: 18px; font-weight: 600; color: var(--brass);
  }
  .hero .hero-stats .stat .l { font-size: 10.5px; color: #b3a488; text-transform: uppercase; letter-spacing: .1em; margin-top: 1px; }
  .hero-deco {
    position: absolute; right: -30px; top: 50%; transform: translateY(-50%) rotate(-8deg);
    font-size: 300px; opacity: 0.08; z-index: 1; line-height: 1; filter: grayscale(.2);
    animation: floaty 9s ease-in-out infinite;
  }
  @keyframes floaty {
    0%, 100% { transform: translateY(-50%) rotate(-8deg); }
    50% { transform: translateY(-54%) rotate(-5deg); }
  }

  /* Grid */
  .section-head {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin: 52px 0 26px; flex-wrap: wrap; gap: 12px;
  }
  .section-head h2 {
    font-family: 'Fraunces', Georgia, serif; font-weight: 600; font-size: 30px;
    letter-spacing: -0.015em; position: relative; padding-bottom: 10px;
  }
  .section-head h2::after {
    content: ""; position: absolute; left: 0; bottom: 0; width: 46px; height: 3px;
    border-radius: 3px; background: linear-gradient(90deg, var(--saffron), var(--brass));
  }
  .section-head .count {
    font-size: 13px; color: var(--muted); background: var(--surface);
    border: 1px solid var(--line); padding: 5px 12px; border-radius: 999px;
  }

  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(248px, 1fr));
    gap: 24px; padding-bottom: 80px;
  }
  .card {
    background: var(--surface); border: 1px solid var(--line); border-radius: 18px;
    overflow: hidden; display: flex; flex-direction: column; position: relative;
    transition: transform .25s cubic-bezier(.2,.8,.2,1), box-shadow .25s ease, border-color .25s;
    box-shadow: 0 1px 2px rgba(40,28,12,.04);
    animation: cardIn .5s cubic-bezier(.2,.8,.2,1) both;
  }
  .card::before {
    content: ""; position: absolute; left: 0; right: 0; top: 0; height: 3px; z-index: 3;
    background: linear-gradient(90deg, var(--saffron), var(--brass));
    transform: scaleX(0); transform-origin: left; transition: transform .35s ease;
  }
  .card:hover::before { transform: scaleX(1); }
  .card:hover {
    transform: translateY(-6px); border-color: rgba(217,162,75,.55);
    box-shadow: 0 22px 44px rgba(40,28,12,.16), 0 6px 14px rgba(232,115,46,.10);
  }
  @keyframes cardIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
  .grid .card:nth-child(1) { animation-delay: .02s; }
  .grid .card:nth-child(2) { animation-delay: .06s; }
  .grid .card:nth-child(3) { animation-delay: .10s; }
  .grid .card:nth-child(4) { animation-delay: .14s; }
  .grid .card:nth-child(5) { animation-delay: .18s; }
  .grid .card:nth-child(6) { animation-delay: .22s; }
  .grid .card:nth-child(7) { animation-delay: .26s; }
  .grid .card:nth-child(8) { animation-delay: .30s; }
  .card .thumb {
    aspect-ratio: 4/3;
    background: radial-gradient(circle at 50% 35%, var(--surface-2), #ecdfca);
    display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative;
  }
  .card .thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform .35s ease; }
  .card:hover .thumb img { transform: scale(1.05); }
  .card .thumb .ph { font-size: 60px; opacity: .55; filter: drop-shadow(0 4px 8px rgba(40,28,12,.12)); }
  .card .pill {
    position: absolute; top: 11px; left: 11px;
    background: rgba(28,24,20,.78); backdrop-filter: blur(4px);
    color: #f3ead9; font-size: 10.5px; text-transform: uppercase; font-weight: 600;
    letter-spacing: .09em; padding: 5px 10px; border-radius: 999px;
  }
  .card .body { padding: 17px 17px 18px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .card .name { font-weight: 700; font-size: 16px; letter-spacing: -.01em; }
  .card .desc { font-size: 13px; color: var(--muted); line-height: 1.5; flex: 1; }
  .card .row { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; gap: 10px; }
  .card .price {
    font-family: 'Fraunces', Georgia, serif; font-size: 22px; font-weight: 600; color: var(--text);
  }
  .add-btn {
    background: var(--ink); color: #f3ead9; border: none; border-radius: 10px;
    padding: 9px 15px; font: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
    transition: background .18s, transform .12s; white-space: nowrap;
  }
  .add-btn:hover { background: linear-gradient(150deg, var(--saffron), var(--brass-deep)); transform: translateY(-1px); }

  .empty {
    grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--muted);
  }
  .empty .big { font-size: 52px; margin-bottom: 14px; opacity: .5; }

  /* Modal */
  .overlay {
    position: fixed; inset: 0; background: rgba(24,18,12,.58); backdrop-filter: blur(3px);
    z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px;
    animation: fade .2s ease;
  }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--surface); border-radius: 22px; width: 100%; max-width: 480px;
    max-height: 90vh; overflow-y: auto; padding: 34px;
    border: 1px solid var(--line); box-shadow: 0 30px 70px rgba(24,18,12,.4);
    animation: rise .26s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes rise { from { opacity: 0; transform: translateY(16px) scale(.98); } to { opacity: 1; transform: none; } }
  .modal.wide { max-width: 640px; }
  .modal h3 {
    font-family: 'Fraunces', Georgia, serif; font-size: 25px; font-weight: 600;
    margin-bottom: 6px; letter-spacing: -.01em;
  }
  .modal .sub { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 7px; }
  .field input, .field textarea, .field select {
    width: 100%; border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px;
    font: inherit; font-size: 14px; background: var(--surface-2); color: var(--text);
    transition: border-color .18s, box-shadow .18s;
  }
  .field textarea { resize: vertical; min-height: 74px; }
  .field input:focus, .field textarea:focus, .field select:focus {
    outline: none; border-color: var(--saffron); box-shadow: 0 0 0 3px rgba(232,115,46,.14);
  }
  .modal-actions { display: flex; gap: 10px; margin-top: 26px; }
  .choice-card {
    display: flex; align-items: center; gap: 14px; width: 100%; text-align: left;

  projectId: "maa-santoshi-store",

const ADMIN_EMAIL = "jaindeepesh1094@gmail.com"; // only this signed-in account may edit the store
const FB = { enabled: false, db: null, auth: null };
(function initFirebase() {
  try {
    if (typeof firebase !== "undefined" && FIREBASE_CONFIG.apiKey) {
      firebase.initializeApp(FIREBASE_CONFIG);

// When Firebase is off (or fails to load) there is no injected window.storage, so fall back to

if (typeof window !== "undefined" && !window.storage) {
  window.storage = {
    get: async (k) => { try { const v = localStorage.getItem(k); return v === null ? null : { value: v }; } catch { return null; } },
    set: async (k, v) => { try { localStorage.setItem(k, v); } catch (err) {} },

async function savePin(pin) {

// format a number as Indian rupees with comma grouping, e.g. 12500 -> ₹12,500
function rupees(n) {
  return "₹" + Number(n||0).toLocaleString('en-IN');
}
// the store-wide sale percent currently in effect (0 if none/off)
function salePercent(settings) {
  const p = settings && settings.promo;
  if (p && p.on && Number(p.percent) > 0 && Number(p.percent) < 100) return Number(p.percent);
  return 0;
}
// effective discount % for an item = larger of its own discount and the store-wide sale
function effectiveDiscount(it, settings) {
  const own = Number(it.discount) || 0;
  const sale = salePercent(settings);
  const d = Math.max(own > 0 && own < 100 ? own : 0, sale);
  return d > 0 && d < 100 ? d : 0;
}
// final price after the effective discount (rounded to whole rupees)
function finalPrice(it, settings) {
  const d = effectiveDiscount(it, settings);
  return d > 0 ? Math.round(it.price * (1 - d/100)) : it.price;
}
function hasDiscount(it, settings) {
  return effectiveDiscount(it, settings) > 0;
}
function catEmoji(cat) { return EMOJI[cat] || FALLBACK_EMOJI; }
// look up an active discount code by its text (case-insensitive); returns the matching code object or null
function findActiveCode(settings, input) {
  const c = (input || "").trim().toLowerCase();
  if (!c) return null;
  const codes = (settings && settings.codes) || [];
  return codes.find(x => x.active && (x.code || "").trim().toLowerCase() === c) || null;
}
// stricter email check: local@domain.tld, a 2+ char TLD, and no spaces
function isValidEmail(email) {
  return /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/.test((email || "").trim());
}
// validate an Indian mobile number; returns the normalized 10-digit string, or null if invalid.
// accepts spaces/dashes and an optional +91 / 91 / 0 prefix; mobile numbers start with 6–9.
function normalizePhone(input) {
  let d = (input || "").replace(/\D/g, "");
  if (d.length === 12 && d.startsWith("91")) d = d.slice(2);
  else if (d.length === 11 && d.startsWith("0")) d = d.slice(1);
  return /^[6-9]\d{9}$/.test(d) ? d : null;
}
// pretty-print a stored 10-digit number as "+91 XXXXX XXXXX"
function fmtPhone(p) {
  const d = (p || "").replace(/\D/g, "");
  const ten = d.length > 10 ? d.slice(-10) : d;
  return ten.length === 10 ? "+91 " + ten.slice(0, 5) + " " + ten.slice(5) : (p || "");
}

// ---- order status workflow ----
const ORDER_FLOW = ["new", "accepted", "packed", "out", "delivered"];
const STATUS_META = {
  new:       { label:"New",              emoji:"🆕" },
  accepted:  { label:"Accepted",         emoji:"✅" },
  packed:    { label:"Packed",           emoji:"📦" },
  out:       { label:"Out for delivery", emoji:"🚚" },
  delivered: { label:"Delivered",        emoji:"🎉" },
  cancelled: { label:"Cancelled",        emoji:"✖" },
};
function orderStatus(o) { return (o && o.status) || "new"; }
function statusLabel(k) { return (STATUS_META[k] || STATUS_META.new).label; }
function nextStatus(k) { const i = ORDER_FLOW.indexOf(k); return (i >= 0 && i < ORDER_FLOW.length - 1) ? ORDER_FLOW[i + 1] : null; }

// ---- stock / availability ----
function itemStock(it) { return Number.isFinite(it && it.stock) ? it.stock : null; } // null = untracked (always available)
function isAvailable(it) { return !it || it.available !== false; }
function inStock(it) { const s = itemStock(it); return s == null || s > 0; }

// ---- charges + totals ----
function orderCharges(settings) {
  const c = (settings && settings.charges) || {};
  const pct = Number(c.gstPercent);
  return {
    deliveryFee: Math.max(0, Number(c.deliveryFee) || 0),
    freeAbove:   Math.max(0, Number(c.freeAbove)   || 0),
    minOrder:    Math.max(0, Number(c.minOrder)    || 0),
    gstPercent:  (pct > 0 && pct < 100) ? pct : 0,
  };
}
// given a goods subtotal (already after item / store-wide discounts), apply a code %, delivery fee and GST
function computeTotals(subtotal, settings, codePercent) {
  const ch = orderCharges(settings);
  const codeDiscount = codePercent > 0 ? Math.round(subtotal * codePercent / 100) : 0;
  const afterDiscount = Math.max(0, subtotal - codeDiscount);
  const deliveryFee = afterDiscount <= 0 ? 0
    : (ch.freeAbove > 0 && afterDiscount >= ch.freeAbove ? 0 : ch.deliveryFee);
  const gstAmount = ch.gstPercent > 0 ? Math.round(afterDiscount * ch.gstPercent / 100) : 0;
  return { subtotal, codeDiscount, afterDiscount, deliveryFee, gstAmount,
    gstPercent: ch.gstPercent, freeAbove: ch.freeAbove, minOrder: ch.minOrder,
    total: afterDiscount + deliveryFee + gstAmount };
}

// ---- WhatsApp ordering ----
function waLink(num10, text) {
  const d = (num10 || "").replace(/\D/g, "").slice(-10);
  if (d.length !== 10) return null;
  return "https://wa.me/91" + d + (text ? ("?text=" + encodeURIComponent(text)) : "");
}
function orderToText(order, settings) {
  const lines = order.lines.map(l => "• " + l.qty + " × " + l.name + " — " + rupees(l.price * l.qty)).join("\n");
  let t = "Hello Maa Santoshi Steel Center, I'd like to place this order:\n\n" + lines +
    "\n\nSubtotal: " + rupees(order.subtotal != null ? order.subtotal : order.total);
  if (order.codeDiscount) t += "\nCode " + order.code + " (-" + order.codePercent + "%): -" + rupees(order.codeDiscount);
  if (order.deliveryFee) t += "\nDelivery: " + rupees(order.deliveryFee);
  if (order.gstAmount) t += "\nGST (" + order.gstPercent + "%): " + rupees(order.gstAmount);
  t += "\nTotal: " + rupees(order.total) + "\n\nName: " + (order.name || order.customer || "");
  if (order.phone) t += "\nPhone: " + fmtPhone(order.phone);
  if (order.address) t += "\nDeliver to: " + order.address;
  return t;
}

// ---- CSV export of orders (for bookkeeping) ----
function csvCell(v) { const s = String(v == null ? "" : v); return /[",\n\r]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; }
function ordersToCSV(orders) {
  const head = ["Order ID","Date","Customer","Phone","Email","Address","Items","Subtotal","Code","Discount","Delivery","GST","Total","Status"];
  const rows = orders.map(o => [
    o.id, o.when, o.name || o.customer || "", o.phone ? ("+91" + o.phone) : "", o.email || "",
    (o.address || "").replace(/\s+/g, " "),
    (o.lines || []).map(l => l.qty + "x " + l.name).join("; "),
    o.subtotal != null ? o.subtotal : o.total, o.code || "", o.codeDiscount || 0,
    o.deliveryFee || 0, o.gstAmount || 0, o.total, statusLabel(orderStatus(o)),
  ]);
  return [head, ...rows].map(r => r.map(csvCell).join(",")).join("\r\n");
}

function App() {
  const [items, setItems] = useState(null);
  const [orders, setOrders] = useState([]);
  const [registeredCustomers, setRegisteredCustomers] = useState([]); // customers who have signed in (Firestore; admin view)
  const [authUid, setAuthUid] = useState(null); // Firebase auth uid (anonymous for customers) — used for own-order live reads
  const catalogItemsRef = useRef(null); // latest catalog (FB) for merging live stock counts
  const stockMapRef = useRef({});        // latest live stock counts by item id
  const [filter, setFilter] = useState("All");
  const [cart, setCart] = useState([]); // {id, qty}
  const [modal, setModal] = useState(null); // 'cart','login','admin','adminLogin','addItem'
  const [user, setUser] = useState(null); // {name,email}
  const [isAdmin, setIsAdmin] = useState(false);
  const [adminPin, setAdminPin] = useState(DEFAULT_PIN);
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [search, setSearch] = useState("");
  const [toast, setToast] = useState("");
  const [editItem, setEditItem] = useState(null);
  const [seenDeliveries, setSeenDeliveries] = useState([]); // ids of delivery updates the customer has viewed
  const [acctOpen, setAcctOpen] = useState(false); // account dropdown menu
  const [appliedCode, setAppliedCode] = useState(null); // {code, percent} entered by the customer in the cart
  const [theme, setTheme] = useState("light"); // 'light' | 'dark' — customer-selectable
  const [viewItem, setViewItem] = useState(null); // product open in the detail modal
  const [sort, setSort] = useState("featured");   // catalog sort order
  const [priceMin, setPriceMin] = useState("");
  const [priceMax, setPriceMax] = useState("");

  useEffect(() => {
    (async () => {
      // device-local data (always from this browser)
      setOrders(await loadOrders());
      setTheme(await loadTheme());
      setUser(await loadCustomer());
      if (!FB.enabled) {
        setAdminPin(await loadPin());
        // republish the baked catalog + settings when STORE_VERSION is bumped (local mode only)
        const ver = await window.storage.get("store:version", true);
        if (ver && ver.value && ver.value !== STORE_VERSION) { await saveItems(SEED); await saveSettings(DEFAULT_SETTINGS); }
        if (!ver || !ver.value || ver.value !== STORE_VERSION) { await window.storage.set("store:version", STORE_VERSION, true); }
        let it = await loadItems();
        if (!it) { it = SEED; await saveItems(SEED); }
        setItems(it);
        setSettings(await loadSettings());
      }
    })();
    if (FB.enabled) {
      // merge live per-item stock counts into the catalog for display
      const applyStock = () => {
        const cat = catalogItemsRef.current;
        if (cat) setItems(cat.map(it => stockMapRef.current[it.id] != null ? { ...it, stock: stockMapRef.current[it.id] } : it));
      };
      // live catalog for every visitor (falls back to the built-in list until the shop is first seeded)
      const offItems = FB.db.collection("shop").doc("catalog").onSnapshot(
        d => { catalogItemsRef.current = d.exists ? (d.data().items || []) : SEED; applyStock(); },
        err => { console.error(err); catalogItemsRef.current = SEED; applyStock(); });
      // live per-item stock counts (decrease the instant an order is placed)
      const offStock = FB.db.collection("stock").onSnapshot(
        snap => { const m = {}; snap.docs.forEach(x => { const c = x.data().count; if (c != null) m[x.id] = c; }); stockMapRef.current = m; applyStock(); },
        err => console.error(err));
      // live settings (discounts, promo, codes, shop info, charges)
      const offSettings = FB.db.collection("shop").doc("settings").onSnapshot(
        d => setSettings(d.exists
          ? { ...DEFAULT_SETTINGS, ...d.data(), categories: (d.data().categories && d.data().categories.length) ? d.data().categories : DEFAULT_CATEGORIES }
          : DEFAULT_SETTINGS),
        err => console.error(err));
      // give every visitor an identity: anonymous for customers (so they can read their OWN orders live),
      // email/password for the admin. Seed the shop the first time the owner signs in.
      let seeded = false, triedAnon = false;
      const offAuth = FB.auth.onAuthStateChanged(async (u) => {
        if (!u) { if (!triedAnon) { triedAnon = true; try { await FB.auth.signInAnonymously(); } catch(e){ console.error("anonymous sign-in failed (enable it in Firebase Auth)", e); } } return; }
        const admin = u.email === ADMIN_EMAIL;
        setIsAdmin(admin);
        setAuthUid(u.uid);
        if (admin && !seeded) {
          seeded = true;
          try {
            const cat = await FB.db.collection("shop").doc("catalog").get();
            if (!cat.exists || !(cat.data().items || []).length) await FB.db.collection("shop").doc("catalog").set({ items: SEED });
            const st = await FB.db.collection("shop").doc("settings").get();
            if (!st.exists) await FB.db.collection("shop").doc("settings").set(DEFAULT_SETTINGS);
          } catch (err) { console.error(err); }
        }
      });
      return () => { offItems(); offSettings(); offStock(); offAuth(); };
    }
  }, []);

  // reflect the chosen theme on <html> so the [data-theme="dark"] CSS variables take effect
  useEffect(() => {
    if (typeof document !== "undefined") document.documentElement.setAttribute("data-theme", theme);
  }, [theme]);

  // when the admin is signed in, stream every order from Firestore into the Inbox live (real-time "new" badge);
  // customers keep their own local copy for "My orders"
  useEffect(() => {
    if (!FB.enabled) return;
    if (isAdmin) {
      const offOrders = FB.db.collection("orders").onSnapshot(
        snap => setOrders(snap.docs.map(d => d.data()).sort((a,b) => (b.ts||0) - (a.ts||0))),
        err => console.error(err));
      const offCust = FB.db.collection("customers").onSnapshot(
        snap => setRegisteredCustomers(snap.docs.map(d => d.data())),
        err => console.error(err));
      return () => { offOrders(); offCust(); };
    }
    if (authUid) {
      // customer: keep this device's own orders, overlay live status/delivery from Firestore, and honour admin deletions
      const off = FB.db.collection("orders").where("uid","==",authUid).onSnapshot(
        async (snap) => {
          const live = {}; snap.docs.forEach(d => { const o = d.data(); if (o && o.id) live[o.id] = o; });
          const local = await loadOrders();
          const result = [];
          (Array.isArray(local) ? local : []).forEach(o => {
            if (!o || !o.id) return;
            if (live[o.id]) result.push(live[o.id]);                 // live version → fresh status/delivery/note
            else if (o.uid && o.uid === authUid) { /* was ours in the cloud, now gone → admin deleted it → drop */ }
            else result.push(o);                                     // local-only (older / another device) → keep, never vanish
          });
          Object.keys(live).forEach(id => { if (!result.some(o => o.id === id)) result.push(live[id]); });
          const sorted = result.sort((a,b) => (b.ts||0) - (a.ts||0));
          setOrders(sorted); saveOrders(sorted);
        },
        err => { console.error(err); loadOrders().then(o => setOrders(Array.isArray(o) ? o : [])); });
      return () => off();
    }
    (async () => setOrders(await loadOrders()))();
  }, [isAdmin, authUid]);

  // one-time migration: create a live stock/{id} doc for any item that has a stock number
  // in the catalog but no stock doc yet (only the admin may create these). Idempotent —
  // it only fills in missing docs, never overwrites a live (already-decremented) count.
  useEffect(() => {
    if (!FB.enabled || !isAdmin || !Array.isArray(items)) return;
    items.forEach(it => {
      if (it && Number.isFinite(it.stock) && stockMapRef.current[it.id] == null) {
        FB.db.collection("stock").doc(it.id).set({ count: Math.max(0, Math.floor(it.stock)) })
          .catch(e => console.error("stock seed failed", e));
      }
    });
  }, [isAdmin, items]);

  const showToast = (m) => { setToast(m); setTimeout(()=>setToast(""), 2600); };
  const toggleTheme = () => {
    const next = theme === "dark" ? "light" : "dark";
    setTheme(next); saveTheme(next);
  };

  const goHome = () => {
    setFilter("All");
    setSearch("");
    setModal(null);
    if (typeof window !== "undefined") window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const refreshOrders = async () => setOrders(await loadOrders());

  const addToCart = (id, n=1) => {
    const it = items?.find(i=>i.id===id);
    if (!it || !inStock(it)) { showToast("Out of stock"); return; }
    const stock = itemStock(it);
    const cur = cart.find(x=>x.id===id)?.qty || 0;
    let add = n;
    if (stock != null) add = Math.min(n, Math.max(0, stock - cur));
    if (add <= 0) { showToast("Only " + stock + " in stock"); return; }
    setCart(c => {
      const f = c.find(x=>x.id===id);
      if (f) return c.map(x=>x.id===id?{...x,qty:x.qty+add}:x);
      return [...c, {id, qty:add}];
    });
    showToast(add>1 ? ("Added " + add + " to cart") : "Added to cart");
  };
  const setQty = (id, d) => setCart(c => c.map(x=>{
    if (x.id!==id) return x;
    const it = items?.find(i=>i.id===id);
    const stock = it ? itemStock(it) : null;
    let q = Math.max(1, x.qty + d);
    if (stock != null && q > stock) q = Math.max(1, stock);
    return {...x, qty:q};
  }));
  const removeCart = (id) => setCart(c => c.filter(x=>x.id!==id));

  const cartCount = cart.reduce((s,x)=>s+x.qty,0);
  const cartItems = cart.map(c => ({...c, item: items?.find(i=>i.id===c.id)})).filter(x=>x.item);
  const cartTotal = cartItems.reduce((s,x)=>s+finalPrice(x.item, settings)*x.qty,0);
  // full breakdown: code discount, delivery fee, GST, and the payable total
  const totals = computeTotals(cartTotal, settings, appliedCode ? appliedCode.percent : 0);
  const applyCode = (input) => {
    const found = findActiveCode(settings, input);
    if (!found) return "That code isn’t valid or is no longer active.";
    setAppliedCode({ code: (found.code || "").trim().toUpperCase(), percent: Number(found.percent) || 0 });
    return null; // success
  };
  const removeCode = () => setAppliedCode(null);

  const placeOrder = async (via) => {
    if (!user || !user.address || !user.address.trim()) return; // safety: address required
    if (cartItems.length === 0) return;
    // re-check the code at submit time in case the admin disabled it after it was applied
    const valid = appliedCode ? findActiveCode(settings, appliedCode.code) : null;
    const pct = valid ? (Number(valid.percent) || 0) : 0;
    const t = computeTotals(cartTotal, settings, pct);
    if (t.minOrder > 0 && t.afterDiscount < t.minOrder) { showToast("Minimum order is " + rupees(t.minOrder)); return; }
    const order = {
      id: "o"+Date.now(), ts: Date.now(),
      uid: (FB.enabled && FB.auth.currentUser) ? FB.auth.currentUser.uid : null,
      customer: user.name || user.email, name: user.name || "", email: user.email, phone: user.phone || "", address: user.address.trim(),
      lines: cartItems.map(x=>({id:x.item.id, name:x.item.name, qty:x.qty, price:finalPrice(x.item, settings)})),
      subtotal: t.subtotal,
      code: pct > 0 ? (valid.code || "").trim().toUpperCase() : null,
      codePercent: pct, codeDiscount: t.codeDiscount,
      deliveryFee: t.deliveryFee, gstPercent: t.gstPercent, gstAmount: t.gstAmount,
      total: t.total,
      status: "new", statusAt: new Date().toLocaleString(),
      when: new Date().toLocaleString(), read: false,
    };
    // open WhatsApp synchronously (before any await) so mobile browsers don't block the popup
    if (via === "whatsapp") {
      const link = waLink(settings.shop && settings.shop.whatsapp, orderToText(order, settings));
      if (link && typeof window !== "undefined") window.open(link, "_blank");
    }
    // send the order to the shop's Inbox (Firestore) so it arrives on any device, live
    if (FB.enabled) { try { await FB.db.collection("orders").doc(order.id).set(order); } catch(e){ console.error("order send failed", e); } }
    // keep a copy on this device for the customer's own "My orders"
    const next = [order, ...orders];
    setOrders(next); await saveOrders(next);
    // decrement tracked stock for the items just ordered
    if (FB.enabled) {
      // per-item stock docs: a transaction decrements the count (rules allow signed-in users to only decrease) — instant + live for everyone
      await Promise.all(cartItems.map(async (x) => {
        const ref = FB.db.collection("stock").doc(x.item.id);
        try {
          await FB.db.runTransaction(async (t) => {
            const d = await t.get(ref);
            if (!d.exists) return; // untracked item
            const cur = Number(d.data().count) || 0;
            t.update(ref, { count: Math.max(0, cur - x.qty) });
          });
        } catch(e){ console.error("stock decrement failed", e); }
      }));
    } else {
      let nextItems = items;
      cartItems.forEach(x => { nextItems = nextItems.map(it => (it.id===x.item.id && itemStock(it)!=null) ? {...it, stock: Math.max(0, it.stock - x.qty)} : it); });
      setItems(nextItems); await saveItems(nextItems);
    }
    setCart([]); setAppliedCode(null); setModal(null);
    showToast(via === "whatsapp" ? "Order placed — opening WhatsApp…" : "Order placed — sent to the shop");
  };

  const saveAddress = (addr) => setUser(u => { const n = {...u, address: addr}; saveCustomer(n); return n; });

  // record a signed-in customer so the shop can see them in the dashboard, even before they order
  const registerCustomer = async (u) => {
    if (!FB.enabled || !u || !u.email) return;
    try {
      await FB.db.collection("customers").doc(u.email).set(
        { email:u.email, name:u.name||"", phone:u.phone||"", lastSeen:new Date().toLocaleString(), ts:Date.now() },
        { merge:true });
    } catch(e){ console.error("customer register failed", e); }
  };
  // shared handler for both new and returning customer sign-in
  const customerLogin = (u) => {
    setUser(u); saveCustomer(u); registerCustomer(u); setModal(null);
    showToast("Welcome, " + (u.name ? u.name.split(' ')[0] : 'back') + "!");
  };
  // admin: delete a single order (removes it live for the admin Inbox and the customer's My Orders)
  const deleteOrder = async (orderId) => {
    if (FB.enabled) { try { await FB.db.collection("orders").doc(orderId).delete(); } catch(e){ console.error(e); } showToast("Order deleted"); return; }
    const next = orders.filter(o => o.id !== orderId);
    setOrders(next); await saveOrders(next);
    showToast("Order deleted");
  };

  // restore stock when an order is cancelled (matches lines by item id) — admin only (rules block customer increases)
  const restoreStock = async (lines) => {
    if (!Array.isArray(lines)) return;
    if (FB.enabled) {
      await Promise.all(lines.map(async (l) => {
        if (!l.id) return;
        const ref = FB.db.collection("stock").doc(l.id);
        try { await FB.db.runTransaction(async (t) => { const d = await t.get(ref); if (d.exists) t.update(ref, { count: (Number(d.data().count)||0) + (l.qty||0) }); }); }
        catch(e){ console.error("stock restore failed", e); }
      }));
      return;
    }
    let next = items;
    lines.forEach(l => { next = next.map(it => (l.id && it.id===l.id && itemStock(it)!=null) ? {...it, stock: it.stock + (l.qty||0)} : it); });
    setItems(next); await saveItems(next);
  };
  // customer: cancel their OWN order — only while it's still "New" — and put the stock back
  const customerDeleteOrder = async (orderId) => {
    const o = orders.find(x => x.id === orderId);
    if (o && orderStatus(o) !== "new") { showToast("This order is already being processed — please message the shop to change it."); return; }
    if (FB.enabled) {
      try { await FB.db.collection("orders").doc(orderId).delete(); } catch(e){ console.error(e); showToast("Couldn’t cancel — please try again"); return; }
      if (o) await restoreStock(o.lines);   // add the stock back
    } else {
      const next = orders.filter(x => x.id !== orderId); setOrders(next); await saveOrders(next);
      if (o) await restoreStock(o.lines);
    }
    showToast("Order cancelled — stock updated");
  };
  const setOrderStatus = async (orderId, status) => {
    const o = orders.find(x=>x.id===orderId);
    if (!o) return;
    const wasCancelled = orderStatus(o) === "cancelled";
    if (FB.enabled) {
      try { await FB.db.collection("orders").doc(orderId).update({status, statusAt: new Date().toLocaleString()}); } catch(e){ console.error(e); }
    } else {
      const next = orders.map(x => x.id===orderId ? {...x, status, statusAt: new Date().toLocaleString()} : x);
      setOrders(next); await saveOrders(next);
    }
    if (status === "cancelled" && !wasCancelled) await restoreStock(o.lines);
    showToast("Order marked " + statusLabel(status));
  };
  // re-add a past order's items to the cart (skips removed / unavailable / out-of-stock lines)
  const reorder = (order) => {
    setCart(prev => {
      let c = [...prev];
      (order.lines||[]).forEach(l => {
        const it = items.find(i => (l.id && i.id===l.id) || (i.name||"").toLowerCase() === (l.name||"").toLowerCase());
        if (!it || !isAvailable(it)) return;
        const stock = itemStock(it);
        const ex = c.find(x=>x.id===it.id);
        const cur = ex ? ex.qty : 0;
        let add = l.qty || 1;
        if (stock != null) add = Math.min(add, Math.max(0, stock - cur));
        if (add <= 0) return;
        c = ex ? c.map(x=>x.id===it.id?{...x,qty:x.qty+add}:x) : [...c, {id:it.id, qty:add}];
      });
      return c;
    });
    setModal("cart");
    showToast("Added your previous items to the cart");
  };

  // admin: add / edit / delete
  const upsertItem = async (data) => {
    const isEdit = data.id && items.find(i=>i.id===data.id);
    const id = isEdit ? data.id : "i"+Date.now();
    const item = {...data, id};
    const next = isEdit ? items.map(i=>i.id===id?item:i) : [item, ...items];
    setItems(next); await saveItems(next);
    // mirror the admin-set stock to the live per-item stock collection (blank = untracked → remove)
    if (FB.enabled) {
      try {
        if (Number.isFinite(item.stock)) await FB.db.collection("stock").doc(id).set({ count: Math.max(0, Math.floor(item.stock)) });
        else await FB.db.collection("stock").doc(id).delete();
      } catch(e){ console.error("stock save failed", e); }
    }
    setModal(null); setEditItem(null);
    showToast("Item saved");
  };
  const deleteItem = async (id) => {
    const next = items.filter(i=>i.id!==id);
    setItems(next); await saveItems(next);
    showToast("Item removed");
  };
  const toggleAvailable = async (id) => {
    const next = items.map(i => i.id===id ? {...i, available: i.available===false} : i);
    setItems(next); await saveItems(next);
    showToast(next.find(i=>i.id===id).available===false ? "Item hidden from store" : "Item shown in store");
  };
  const markRead = async () => {
    if (FB.enabled) {
      const unread = orders.filter(o=>!o.read);
      if (unread.length) { const b = FB.db.batch(); unread.forEach(o => b.update(FB.db.collection("orders").doc(o.id), {read:true})); try { await b.commit(); } catch(e){ console.error(e); } }
      return; // the live listener refreshes state
    }
    const next = orders.map(o=>({...o, read:true}));
    setOrders(next); await saveOrders(next);
  };
  const setDelivery = async (orderId, eta) => {
    const delivery = {...eta, sentAt: new Date().toLocaleString()};
    if (FB.enabled) { try { await FB.db.collection("orders").doc(orderId).update({delivery}); } catch(e){ console.error(e); } return; }
    const next = orders.map(o => o.id===orderId ? {...o, delivery} : o);
    setOrders(next); await saveOrders(next);
  };
  const changePin = async (current, next) => {
    if (current !== adminPin) return "Current password is incorrect.";
    if (!next || next.length < 4) return "New password must be at least 4 characters.";
    setAdminPin(next); await savePin(next);
    return null; // success
  };
  const updateSettings = async (patch) => {
    const next = { ...settings, ...patch };
    setSettings(next); await saveSettings(next);
  };
  const deleteCustomer = async (email) => {
    if (FB.enabled) {
      const b = FB.db.batch();
      orders.filter(o => o.email === email).forEach(o => b.delete(FB.db.collection("orders").doc(o.id)));
      b.delete(FB.db.collection("customers").doc(email));
      try { await b.commit(); } catch(e){ console.error(e); }
      showToast("Customer removed"); return;
    }
    const next = orders.filter(o => o.email !== email);
    setOrders(next); await saveOrders(next);
    showToast("Customer removed");
  };

  // backup: bundle everything into a JSON file the admin can save to a folder
  const exportData = async () => {
    const backup = {
      _app: "maa-santoshi-steel-center",
      _version: 1,
      exportedAt: new Date().toISOString(),
      items, orders, settings, adminPin,
    };
    const json = JSON.stringify(backup, null, 2);
    const stamp = new Date().toISOString().slice(0,10);
    const filename = "store-backup-" + stamp + ".json";

    // Modern browsers (Chrome/Edge): open a real "Save As" dialog so the admin
    // can pick Desktop or any folder and choose the filename.
    if (window.showSaveFilePicker) {
      try {
        const handle = await window.showSaveFilePicker({
          suggestedName: filename,
          types: [{ description: "Store backup", accept: { "application/json": [".json"] } }],
        });
        const writable = await handle.createWritable();
        await writable.write(json);
        await writable.close();
        showToast("Backup saved");
        return;
      } catch (err) {
        if (err && err.name === "AbortError") return; // admin cancelled the dialog
        // otherwise fall through to the standard download
      }
    }

    // Fallback (Safari/Firefox): download to the browser's Downloads folder.
    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    showToast("Backup downloaded");
  };

  // export just the orders as a CSV spreadsheet for bookkeeping
  const exportOrdersCSV = async () => {
    if (!orders.length) { showToast("No orders to export yet"); return; }
    const csv = ordersToCSV(orders);
    const filename = "orders-" + new Date().toISOString().slice(0,10) + ".csv";
    if (window.showSaveFilePicker) {
      try {
        const handle = await window.showSaveFilePicker({ suggestedName: filename,
          types: [{ description: "CSV spreadsheet", accept: { "text/csv": [".csv"] } }] });
        const w = await handle.createWritable(); await w.write(csv); await w.close();
        showToast("Orders exported"); return;
      } catch (err) { if (err && err.name === "AbortError") return; }
    }
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    showToast("Orders downloaded");
  };

  // restore: read a backup file and write it back into storage
  const importData = (file) => {
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        const data = JSON.parse(reader.result);
        if (!data || data._app !== "maa-santoshi-steel-center" || !Array.isArray(data.items)) {
          showToast("That file isn’t a valid store backup");
          return;
        }
        setItems(data.items); await saveItems(data.items);
        const ords = Array.isArray(data.orders) ? data.orders : [];
        setOrders(ords); await saveOrders(ords);
        const sett = data.settings ? { ...DEFAULT_SETTINGS, ...data.settings } : DEFAULT_SETTINGS;
        setSettings(sett); await saveSettings(sett);
        if (data.adminPin) { setAdminPin(data.adminPin); await savePin(data.adminPin); }
        showToast("Backup restored");
      } catch (err) {
        showToast("Couldn’t read that file");
      }
    };
    reader.readAsText(file);
  };

  // derive unique customers from orders (most recent first)
  const customers = (() => {
    const map = {};
    // customers who have signed in — visible even before they place an order
    registeredCustomers.forEach(c => {
      if (!c.email) return;
      map[c.email] = { email:c.email, name:c.name||"", phone:c.phone||"", orders:0, total:0, last:c.lastSeen||"" };
    });
    // fold in order history (also covers older orders from before the customers collection existed)
    orders.forEach(o => {
      if (!map[o.email]) map[o.email] = { email:o.email, name:o.name||"", phone:o.phone||"", orders:0, total:0, last:o.when };
      map[o.email].orders += 1;
      map[o.email].total += o.total || 0;
      if (!map[o.email].name && o.name) map[o.email].name = o.name;
      if (!map[o.email].phone && o.phone) map[o.email].phone = o.phone;
    });
    return Object.values(map);
  })();

  const CATEGORIES = settings.categories || DEFAULT_CATEGORIES;
  const q = search.trim().toLowerCase();
  const pMin = parseFloat(priceMin), pMax = parseFloat(priceMax);
  let shown = (items||[]).filter(i =>
    isAvailable(i) &&
    (filter==="All" || i.cat===filter) &&
    (!q || (i.name+" "+(i.desc||"")+" "+i.cat).toLowerCase().includes(q)) &&
    (isNaN(pMin) || finalPrice(i, settings) >= pMin) &&
    (isNaN(pMax) || finalPrice(i, settings) <= pMax)
  );
  if (sort === "price-asc") shown = [...shown].sort((a,b)=>finalPrice(a,settings)-finalPrice(b,settings));
  else if (sort === "price-desc") shown = [...shown].sort((a,b)=>finalPrice(b,settings)-finalPrice(a,settings));
  else if (sort === "name") shown = [...shown].sort((a,b)=>a.name.localeCompare(b.name));
  const unreadCount = orders.filter(o=>!o.read).length;
  const myOrders = user ? orders.filter(o => o.email === user.email) : [];
  const myDeliveryCount = myOrders.filter(o => o.delivery && !seenDeliveries.includes(o.id+o.delivery.sentAt)).length;

  return e('div', null,
    // header
    e('header', null,
      e('div', {className:'wrap'},
        e('div', {className:'bar'},
          e('div', {className:'logo', onClick:goHome},
            e('span',{className:'crest'+(settings.logo?' has-img':'')},
              settings.logo ? e('img',{src:settings.logo, alt:'Logo'}) : e(LogoMark)),
            e('span', null,
              e('span',{className:'mark'},'Maa Santoshi Steel Center'),
              e('span',{className:'tag'},'Kitchenwares')
            )
          ),
          e('nav', null,
            e('div',{className:'cats'},
              e('button',{className:'cat-btn'+(filter==="All"?" active":""), onClick:()=>setFilter("All")},'All'),
              CATEGORIES.map(c=>e('button',{key:c, className:'cat-btn'+(filter===c?" active":""), onClick:()=>setFilter(c)}, c))
            ),
            e('div',{className:'actions'},
              e('button',{className:'icon-btn', onClick:toggleTheme,
                title:theme==='dark'?'Switch to light theme':'Switch to dark theme',
                'aria-label':'Toggle light or dark theme'}, theme==='dark'?'☀️':'🌙'),
              e('button',{className:'icon-btn', onClick:()=>setModal('cart')}, '🛒',
                cartCount>0 && e('span',{className:'cart-count'}, cartCount)
              ),
              isAdmin && e('button',{className:'icon-btn', onClick:()=>setModal('admin')}, '⚙ Dashboard',
                unreadCount>0 && e('span',{className:'cart-count'}, unreadCount)),
              user && !isAdmin && e('button',{className:'icon-btn', onClick:()=>setModal('myorders')}, '📦 My orders',
                myDeliveryCount>0 && e('span',{className:'cart-count'}, myDeliveryCount)),
              (user || isAdmin)
                ? e('div',{className:'acct-wrap'},
                    e('button',{className:'icon-btn'+(acctOpen?' active':''), onClick:()=>setAcctOpen(o=>!o)},
                      '👤 '+(isAdmin ? 'Admin' : (user.name || user.email.split('@')[0])),
                      e('span',{className:'caret'}, acctOpen?'▴':'▾')),
                    acctOpen && e('div',{className:'acct-menu'},
                      e('div',{className:'acct-id'},
                        e('div',{className:'acct-role'}, isAdmin ? 'Signed in as admin' : 'Signed in as customer'),
                        e('div',{className:'acct-detail'}, isAdmin ? 'Administrator' : (user.name ? user.name : user.email)),
                        (!isAdmin && user.name) && e('div',{className:'acct-sub'}, user.email)
                      ),
                      e('button',{className:'acct-signout', onClick:()=>{
                        setAcctOpen(false);
                        if(isAdmin){ setIsAdmin(false); if(FB.enabled && FB.auth) FB.auth.signOut(); }
                        if(user){ setUser(null); clearCustomer(); }
                        setModal(null); showToast("Signed out");
                      }}, 'Sign out')
                    )
                  )
                : e('button',{className:'btn-primary', onClick:()=>setModal('signinChoice')}, 'Sign in')
            )
          )
        ),
        e('div',{className:'searchrow'},
          e('span',{className:'search-ic'}, '🔎'),
          e('input',{className:'search-input', type:'search', value:search,
            onChange:ev=>setSearch(ev.target.value),
            placeholder:'Search cookware, mixers, cookers…'}),
          search && e('button',{className:'search-clear', onClick:()=>setSearch(""), title:'Clear search'}, '×')
        )
      )
    ),
    // hero
    filter==="All" && e('div',{className:'hero'},
      e('div',{className:'hero-deco'}, '🍳'),
      e('div',{className:'wrap'},
        e('h1', null, 'Tools that make the ', e('em',null,'everyday meal'), ' feel like a craft.'),
        (settings.promo && settings.promo.on && (settings.promo.text || Number(settings.promo.percent)>0)) &&
          e('div',{className:'promo-banner'},
            e('span',{className:'promo-tag'}, Number(settings.promo.percent)>0 ? (Number(settings.promo.percent)+'% OFF') : 'Offer'),
            e('span', null, settings.promo.text ||
              ('Store-wide sale — flat '+Number(settings.promo.percent)+'% off every item!'))
          ),
        e('div',{className:'hero-stats'},
          e('div',{className:'stat'}, e('div',{className:'n'}, (items?items.length:0)+'+'), e('div',{className:'l'}, 'Pieces in stock')),
          e('div',{className:'stat'}, e('div',{className:'n'}, CATEGORIES.length), e('div',{className:'l'}, 'Categories')),
          e('div',{className:'stat'}, e('div',{className:'n'}, 'Free'), e('div',{className:'l'}, 'List & enquire'))
        )
      )
    ),
    // grid
    e('div',{className:'wrap'},
      e('div',{className:'section-head'},
        e('h2', null, q ? 'Search results' : (filter==="All" ? "Everything in the kitchen" : filter)),
        e('span',{className:'count'}, shown.length + (shown.length===1?" item":" items"))
      ),
      items!==null && (items.length>0) && e('div',{className:'toolbar'},
        e('div',{className:'tb-group'},
          e('label', null, 'Sort'),
          e('select',{value:sort, onChange:ev=>setSort(ev.target.value)},
            e('option',{value:'featured'}, 'Featured'),
            e('option',{value:'price-asc'}, 'Price: low to high'),
            e('option',{value:'price-desc'}, 'Price: high to low'),
            e('option',{value:'name'}, 'Name: A–Z'))
        ),
        e('div',{className:'tb-group'},
          e('label', null, 'Price ₹'),
          e('input',{className:'price-in', type:'number', min:0, value:priceMin, onChange:ev=>setPriceMin(ev.target.value), placeholder:'Min'}),
          e('span',{style:{color:'var(--muted)'}}, '–'),
          e('input',{className:'price-in', type:'number', min:0, value:priceMax, onChange:ev=>setPriceMax(ev.target.value), placeholder:'Max'})
        ),
        (sort!=='featured'||priceMin!==''||priceMax!=='') &&
          e('button',{className:'link-btn', onClick:()=>{setSort('featured');setPriceMin('');setPriceMax('');}}, 'Reset')
      ),
      items===null
        ? e('div',{className:'empty'}, 'Loading the shelves…')
        : e('div',{className:'grid'},
            shown.length===0
              ? e('div',{className:'empty'}, e('div',{className:'big'}, q?'🔍':'🍽'),
                  q ? ('No items match “'+search.trim()+'”.') : 'Nothing here yet. Check back soon.')
              : shown.map(it => e(Card, {key:it.id, it, settings, onAdd:()=>addToCart(it.id), onView:()=>{setViewItem(it); setModal('product');}}))
          )
    ),
    e(Footer, {settings}),
    // modals
    modal==='signinChoice' && e(SignInChoice, {
      onClose:()=>setModal(null),
      onCustomer:()=>setModal('login'),
      onReturning:()=>setModal('existingLogin'),
      onAdmin:()=>setModal('adminLogin')
    }),
    modal==='cart' && e(CartModal, {cartItems, cartTotal, totals, appliedCode, setQty, removeCart, settings,
      onApplyCode:applyCode, onRemoveCode:removeCode,
      onClose:()=>setModal(null), user, onSignIn:()=>setModal('signinChoice'), onPlace:placeOrder,
      onSaveAddress:saveAddress, onToast:showToast}),
    modal==='login' && e(LoginModal, {onClose:()=>setModal(null), onLogin:customerLogin}),
    modal==='existingLogin' && e(ExistingLogin, {onClose:()=>setModal(null), onLogin:customerLogin, onNew:()=>setModal('login')}),
    modal==='myorders' && e(MyOrders, {orders:myOrders, onReorder:reorder, onDeleteOrder:customerDeleteOrder, onClose:()=>{
      setSeenDeliveries(myOrders.filter(o=>o.delivery).map(o=>o.id+o.delivery.sentAt));
      setModal(null);
    }}),
    modal==='product' && viewItem && e(ProductModal, {
      it: (items||[]).find(i=>i.id===viewItem.id) || viewItem, settings,
      inCartQty: (cart.find(x=>x.id===viewItem.id)||{}).qty || 0,
      onAdd:(id,n)=>{ addToCart(id,n); setModal(null); },
      onClose:()=>setModal(null)}),
    modal==='adminLogin' && e(AdminLogin, {adminPin, onClose:()=>setModal(null), onOk:()=>{setIsAdmin(true);setModal('admin');showToast("Admin mode on");}}),
    modal==='admin' && e(AdminDash, {items:items||[], orders, unreadCount, settings, customers,
      onClose:()=>setModal(null),
      onAdd:()=>{setEditItem(null);setModal('addItem');},
      onEdit:(it)=>{setEditItem(it);setModal('addItem');},
      onDelete:deleteItem, onToggleAvailable:toggleAvailable, onMarkRead:markRead, onChangePin:changePin,
      onPinChanged:()=>showToast("Password updated"),
      onSetDelivery:setDelivery, onDeliverySent:()=>showToast("Delivery time sent to customer"),
      onSetStatus:setOrderStatus, onDeleteOrder:deleteOrder,
      onUpdateSettings:updateSettings, onSettingsSaved:(m)=>showToast(m||"Saved"),
      onDeleteCustomer:deleteCustomer,
      onExport:exportData, onImport:importData, onExportCSV:exportOrdersCSV,
      onResetPw:()=>{ if(FB.auth) FB.auth.sendPasswordResetEmail(ADMIN_EMAIL).then(()=>showToast("Reset email sent to "+ADMIN_EMAIL)).catch(()=>showToast("Couldn’t send reset email")); },
      onLogout:()=>{setIsAdmin(false); if(FB.enabled && FB.auth) FB.auth.signOut(); setModal(null);showToast("Admin signed out");}}),
    modal==='addItem' && e(ItemForm, {existing:editItem, categories:CATEGORIES, onClose:()=>setModal('admin'), onSave:upsertItem}),
    toast && e('div',{className:'toast'}, toast)
  );
}

function Card({it, settings, onAdd, onView}) {
  const d = effectiveDiscount(it, settings);
  const disc = d > 0;
  const stock = itemStock(it);
  const out = stock != null && stock <= 0;
  const low = stock != null && stock > 0 && stock <= 5;
  return e('div',{className:'card'+(out?' is-out':''), onClick:onView, style:{cursor:'pointer'}},
    e('div',{className:'thumb'},
      it.img ? e('img',{src:it.img, alt:it.name}) : e('span',{className:'ph'}, catEmoji(it.cat)),
      e('span',{className:'pill'}, it.cat),
      disc && e('span',{className:'disc-badge'}, '-'+d+'%'),
      out && e('span',{className:'stock-badge out'}, 'Out of stock')
    ),
    e('div',{className:'body'},
      e('div',{className:'name'}, it.name),
      e('div',{className:'desc'}, it.desc),
      low && e('div',{className:'stock-low'}, 'Only '+stock+' left'),
      e('div',{className:'row'},
        disc
          ? e('span',{className:'price-wrap'},
              e('span',{className:'price'}, rupees(finalPrice(it, settings))),
              e('span',{className:'price-old'}, rupees(it.price))
            )
          : e('span',{className:'price'}, rupees(it.price)),
        e('button',{className:'add-btn', disabled:out,
          onClick:ev=>{ ev.stopPropagation(); onAdd(); }}, out?'Out of stock':'Add to cart')
      )
    )
  );
}

function ProductModal({it, settings, inCartQty, onAdd, onClose}) {
  const d = effectiveDiscount(it, settings);
  const disc = d > 0;
  const stock = itemStock(it);
  const out = stock != null && stock <= 0;
  const remaining = stock != null ? Math.max(0, stock - inCartQty) : null;
  const cap = remaining != null ? Math.max(1, remaining) : 99;
  const [qty, setQty] = useState(1);
  const q = Math.min(qty, cap);
  return e('div',{className:'overlay', onClick:onClose},
    e('div',{className:'modal', onClick:ev=>ev.stopPropagation()},
      e('button',{className:'close-x', onClick:onClose}, '×'),
      e('div',{className:'pd-hero'},
        it.img ? e('img',{src:it.img, alt:it.name}) : e('span',{className:'ph'}, catEmoji(it.cat)),
        disc && e('span',{className:'disc-badge'}, '-'+d+'%'),
        out && e('span',{className:'stock-badge out'}, 'Out of stock')
      ),
      e('span',{className:'pill', style:{position:'static', display:'inline-block', marginBottom:8}}, it.cat),
      e('h3', null, it.name),
      e('div',{style:{display:'flex', alignItems:'baseline', gap:10, margin:'4px 0 12px', flexWrap:'wrap'}},
        e('span',{className:'price', style:{fontSize:26}}, rupees(finalPrice(it, settings))),
        disc && e('span',{className:'price-old', style:{fontSize:16}}, rupees(it.price))
      ),
      e('p',{style:{fontSize:14.5, color:'var(--text)', lineHeight:1.6, marginBottom:14}}, it.desc),
      stock != null && e('div',{style:{fontSize:13, fontWeight:600, marginBottom:16, color:(out||stock<=5)?'var(--danger)':'var(--muted)'}},
        out ? 'Out of stock' : (stock<=5 ? ('Only '+stock+' left in stock') : (stock+' in stock'))),
      out
        ? e('button',{className:'btn-primary', style:{width:'100%'}, disabled:true}, 'Out of stock')
        : e('div',{style:{display:'flex', gap:12, alignItems:'center'}},
            e('div',{className:'qstep'},
              e('button',{onClick:()=>setQty(v=>Math.max(1,v-1)), disabled:q<=1}, '−'),
              e('span',{className:'qn'}, q),
              e('button',{onClick:()=>setQty(v=>Math.min(cap,v+1)), disabled:q>=cap}, '+')
            ),
            e('button',{className:'btn-primary', style:{flex:1}, onClick:()=>onAdd(it.id, q)}, 'Add to cart')
          ),
      remaining != null && !out && inCartQty>0 && e('p',{style:{fontSize:12.5, color:'var(--muted)', marginTop:10}}, inCartQty+' already in your cart')
    )
  );
}

// read-only progress stepper shown to the customer in My Orders
function StatusStepper({status}) {
  if (status === "cancelled")
    return e('div',{style:{marginBottom:12}}, e('span',{className:'status-chip st-cancelled'}, '✖ Cancelled'));
  const cur = Math.max(0, ORDER_FLOW.indexOf(status));
  return e('div',{className:'stepper'},
    ORDER_FLOW.map((k,i)=>e('div',{key:k, className:'step'+(i<cur?' done':(i===cur?' current':''))},
      e('div',{className:'line'}),
      e('div',{className:'dot'}, i<cur?'✓':String(i+1)),
      e('div',{className:'lbl'}, STATUS_META[k].label)
    ))
  );
}

function ExistingLogin({onClose, onLogin, onNew}) {
  const [email,setEmail]=useState(""), [phone,setPhone]=useState(""), [err,setErr]=useState(""), [busy,setBusy]=useState(false);
  const submit=async ()=>{
    setErr("");
    const em = email.trim().toLowerCase();
    if(!isValidEmail(em)){ setErr("Enter a valid email."); return; }
    const ph = normalizePhone(phone);
    if(!ph){ setErr("Enter a valid 10-digit mobile number."); return; }
    if(!FB.enabled){ setErr("Returning sign-in needs a connection — please continue as a new customer."); return; }
    setBusy(true);
    try {
      const doc = await FB.db.collection("customers").doc(em).get();
      const d = doc.exists ? (doc.data()||{}) : null;
      if(d && normalizePhone(d.phone) === ph){
        onLogin({ name: d.name || "", email: d.email || em, phone: ph });
      } else {
        setErr("No matching account found. Check your email and phone, or continue as a new customer.");
        setBusy(false);
      }
    } catch(e){ console.error(e); setErr("Couldn’t verify right now — please try again."); setBusy(false); }
  };
  return e('div',{className:'overlay', onClick:onClose},
    e('div',{className:'modal', onClick:ev=>ev.stopPropagation()},
      e('button',{className:'close-x', onClick:onClose}, '×'),
      e('h3', null, 'Welcome back'),
      e('p',{className:'sub'}, 'Sign in with the email and phone number you used before.'),
      e('div',{className:'field'}, e('label',null,'Email'),
        e('input',{type:'email', value:email, onChange:ev=>{setEmail(ev.target.value);setErr("");}, placeholder:'you@email.com', autoFocus:true})),
      e('div',{className:'field'}, e('label',null,'Phone number'),
        e('div',{style:{display:'flex', alignItems:'stretch'}},
          e('span',{style:{display:'inline-flex', alignItems:'center', padding:'0 12px', border:'1px solid var(--line)', borderRight:'none', borderRadius:'12px 0 0 12px', background:'var(--surface-2)', color:'var(--muted)', fontSize:14, fontWeight:600}}, '+91'),
